<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/favicon/favicon.ico">
    <script>
      window.SHC_API_BASE_URL = "https://api.secondhandcell.com/server";
    </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track My Order | SecondHandCell</title>
  <style>
    :root {
      --brand-blue: #2563eb;
      --brand-blue-dark: #1d4ed8;
      --brand-green: #16a34a;
      --brand-green-dark: #15803d;
      --slate-25: #fbfdff;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-900: #0f172a;
      --amber-500: #f59e0b;
      --amber-700: #b45309;
      --red-600: #dc2626;
      --radius-lg: 24px;
      --shadow-soft: 0 20px 60px rgba(15, 23, 42, 0.08);
      --shadow-card: 0 14px 34px rgba(15, 23, 42, 0.07);
    }

    * { box-sizing: border-box; }

    html { background: #f8fafc; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 34rem),
        radial-gradient(circle at 92% 10%, rgba(34, 197, 94, 0.11), transparent 30rem),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 45%, #ffffff 100%);
      color: var(--slate-900);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    main { flex: 1 0 auto; }

    a, button, input { -webkit-tap-highlight-color: transparent; }
    button, input { font: inherit; }
    button { appearance: none; }

    :focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.28);
      outline-offset: 3px;
      border-radius: 12px;
    }

    .page-shell {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 76px;
    }

    .page-hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(203, 213, 225, 0.78);
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.94)),
        radial-gradient(circle at 18% 15%, rgba(37, 99, 235, 0.16), transparent 36%),
        radial-gradient(circle at 86% 16%, rgba(22, 163, 74, 0.14), transparent 34%);
      box-shadow: var(--shadow-soft);
      padding: clamp(26px, 4vw, 48px);
    }

    .page-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(90deg, black 0%, rgba(0,0,0,.55) 62%, transparent 100%);
    }

    .hero-layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) minmax(280px, 0.82fr);
      gap: clamp(24px, 4vw, 48px);
      align-items: center;
    }

    .page-eyebrow,
    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      border-radius: 999px;
      border: 1px solid rgba(37, 99, 235, 0.16);
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 12px;
    }

    .page-title {
      margin: 18px 0 12px;
      max-width: 720px;
      color: var(--slate-900);
      font-size: clamp(34px, 5vw, 60px);
      line-height: 0.98;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    .page-title span {
      color: var(--brand-blue);
    }

    .page-subtitle {
      margin: 0;
      max-width: 640px;
      color: var(--slate-600);
      font-size: clamp(16px, 1.7vw, 19px);
      line-height: 1.7;
    }

    .hero-trust-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .trust-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(203, 213, 225, 0.92);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--slate-700);
      font-size: 13px;
      font-weight: 750;
      padding: 9px 12px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .trust-chip svg,
    .mini-step svg,
    .detail-icon,
    .field-icon,
    .status-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .hero-side-card {
      position: relative;
      border: 1px solid rgba(203, 213, 225, 0.86);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow-card);
      padding: 22px;
      backdrop-filter: blur(14px);
    }

    .hero-side-card::after {
      content: "";
      position: absolute;
      right: 22px;
      top: 22px;
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.10), rgba(22, 163, 74, 0.12));
      border: 1px solid rgba(203, 213, 225, 0.7);
    }

    .side-card-title {
      margin: 0;
      max-width: 190px;
      color: var(--slate-900);
      font-size: 18px;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .side-card-copy {
      margin: 8px 0 18px;
      max-width: 245px;
      color: var(--slate-600);
      line-height: 1.55;
      font-size: 14px;
    }

    .mini-steps {
      display: grid;
      gap: 10px;
    }

    .mini-step {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid rgba(226, 232, 240, 0.88);
      border-radius: 16px;
      background: #ffffff;
      padding: 12px;
    }

    .mini-step strong {
      display: block;
      color: var(--slate-900);
      font-size: 14px;
      line-height: 1.2;
    }

    .mini-step span {
      display: block;
      margin-top: 3px;
      color: var(--slate-500);
      font-size: 12px;
      line-height: 1.4;
    }

    .section-card,
    .card {
      margin-top: 22px;
      border: 1px solid rgba(203, 213, 225, 0.82);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow-soft);
      padding: clamp(18px, 3vw, 30px);
    }

    .lookup-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    .lookup-head h2,
    .my-orders-header h3 {
      margin: 0;
      color: var(--slate-900);
      font-size: clamp(22px, 2.4vw, 30px);
      font-weight: 900;
      letter-spacing: -0.035em;
    }

    .lookup-head p,
    .my-orders-header p {
      margin: 7px 0 0;
      color: var(--slate-600);
      line-height: 1.55;
      font-size: 15px;
    }

    .lookup-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid rgba(22, 163, 74, 0.18);
      background: #ecfdf5;
      color: #047857;
      font-weight: 800;
      font-size: 13px;
      padding: 9px 12px;
      white-space: nowrap;
    }

    .my-orders {
      border: 1px solid rgba(226, 232, 240, 0.92);
      border-radius: 20px;
      background:
        linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      padding: clamp(16px, 2.4vw, 24px);
    }

    form {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr) auto;
      gap: 14px;
      align-items: end;
      margin-top: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--slate-700);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .field-wrap {
      position: relative;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--slate-200);
      border-radius: 14px;
      background: #ffffff;
      color: var(--slate-900);
      font-size: 15px;
      padding: 13px 14px 13px 42px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    input[type="text"]::placeholder,
    input[type="email"]::placeholder { color: #94a3b8; }

    input[type="text"]:focus,
    input[type="email"]:focus {
      outline: none;
      border-color: rgba(37, 99, 235, 0.78);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      background: #ffffff;
    }

    .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      translate: 0 -50%;
      color: var(--slate-400, #94a3b8);
      pointer-events: none;
    }

    button[type="submit"],
    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 50px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--brand-blue), var(--brand-blue-dark));
      color: #ffffff;
      font-size: 15px;
      font-weight: 850;
      cursor: pointer;
      padding: 0 20px;
      white-space: nowrap;
      box-shadow: 0 14px 26px rgba(37, 99, 235, 0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    button[type="submit"]:hover,
    .primary-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
      box-shadow: 0 18px 34px rgba(37, 99, 235, 0.25);
    }

    button[type="submit"]:active,
    .primary-btn:active { transform: translateY(0); }

    button[disabled] {
      opacity: 0.62;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .secondary-action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(203, 213, 225, 0.95);
      border-radius: 13px;
      background: #ffffff;
      color: var(--slate-900);
      font-weight: 800;
      padding: 12px 16px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .secondary-action-btn:hover {
      transform: translateY(-1px);
      background: var(--slate-50);
      border-color: rgba(37, 99, 235, 0.55);
    }

    .helper-text {
      grid-column: 1 / -1;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 2px 0 0;
      color: var(--slate-500);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-card {
      margin-top: 22px;
      overflow: hidden;
      border: 1px solid rgba(203, 213, 225, 0.88);
      border-radius: 24px;
      background: #ffffff;
      box-shadow: var(--shadow-soft);
    }

    .status-header {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: start;
      padding: clamp(18px, 3vw, 26px);
      background:
        linear-gradient(135deg, rgba(239, 246, 255, 0.95), rgba(240, 253, 244, 0.75));
      border-bottom: 1px solid rgba(226, 232, 240, 0.88);
    }

    .status-icon {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: #ffffff;
      color: var(--brand-blue);
      border: 1px solid rgba(203, 213, 225, 0.86);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border-radius: 999px;
      border: 1px solid rgba(37, 99, 235, 0.18);
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 850;
      padding: 7px 12px;
    }

    #statusTitle {
      display: block;
      margin-top: 10px;
      color: var(--slate-900);
      font-size: clamp(20px, 2.3vw, 28px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.035em;
    }

    .status-message {
      margin: 8px 0 0;
      color: var(--slate-600);
      line-height: 1.6;
      max-width: 780px;
    }

    .status-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      padding: clamp(16px, 2.4vw, 24px);
      margin-top: 0;
    }

    .status-summary-grid > div {
      min-width: 0;
      border: 1px solid rgba(226, 232, 240, 0.92);
      border-radius: 16px;
      background: var(--slate-25);
      padding: 14px;
    }

    .muted-label {
      margin: 0 0 5px;
      color: var(--slate-500);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .value-text {
      margin: 0;
      color: var(--slate-900);
      font-size: 15px;
      font-weight: 850;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .progress-list {
      list-style: none;
      padding: 4px clamp(16px, 2.4vw, 24px) clamp(18px, 2.8vw, 28px);
      margin: 0;
    }

    .progress-item {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      border-radius: 16px;
      padding: 14px;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .progress-item + .progress-item { margin-top: 8px; }

    .progress-item::before {
      content: "";
      position: absolute;
      left: 21px;
      top: 34px;
      width: 2px;
      height: calc(100% - 20px);
      background: var(--slate-200);
    }

    .progress-item:last-child::before { display: none; }

    .dot {
      width: 16px;
      height: 16px;
      margin-top: 3px;
      border-radius: 999px;
      border: 2px solid var(--slate-300);
      background: #ffffff;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 0 5px #ffffff;
    }

    .progress-item.complete {
      background: #f0fdf4;
      border: 1px solid rgba(187, 247, 208, 0.95);
    }

    .progress-item.complete .dot {
      background: var(--brand-green);
      border-color: var(--brand-green);
    }

    .progress-item.complete::before { background: rgba(22, 163, 74, 0.45); }

    .progress-item.current {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    .progress-item.current .dot {
      background: var(--amber-500);
      border-color: var(--amber-500);
      box-shadow: 0 0 0 6px rgba(245, 158, 11, 0.15);
    }

    .progress-item .content { min-width: 0; }

    .progress-item h4 {
      margin: 0 0 5px;
      color: var(--slate-900);
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.015em;
    }

    .progress-item p {
      margin: 0;
      color: var(--slate-600);
      font-size: 14px;
      line-height: 1.5;
    }

    .reoffer-panel {
      margin: 0 clamp(16px, 2.4vw, 24px) clamp(18px, 2.8vw, 28px);
      border: 1px solid #fdba74;
      background: linear-gradient(180deg, #fff7ed, #fffbeb);
      border-radius: 18px;
      padding: clamp(16px, 2.2vw, 22px);
    }

    .reoffer-title {
      margin: 0;
      color: #9a3412;
      font-size: 17px;
      font-weight: 950;
      letter-spacing: -0.02em;
    }

    .reoffer-copy {
      margin: 7px 0 0;
      color: #7c2d12;
      line-height: 1.55;
      font-size: 14px;
    }

    .reoffer-price {
      margin: 12px 0 0;
      color: #7c2d12;
      font-size: clamp(26px, 3vw, 34px);
      font-weight: 950;
      letter-spacing: -0.04em;
    }

    .reoffer-meta {
      margin-top: 12px;
      color: #7c2d12;
      font-size: 14px;
    }

    .reoffer-meta ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .reoffer-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .reoffer-device-card {
      width: 100%;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      padding: 14px;
    }

    .reoffer-device-title {
      color: #9a3412;
      font-weight: 950;
      margin-bottom: 6px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border-radius: 12px;
      border: 0;
      padding: 10px 14px;
      font-weight: 850;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .action-btn:hover { transform: translateY(-1px); }
    .action-btn.accept { background: var(--brand-green); color: #ffffff; box-shadow: 0 10px 20px rgba(22, 163, 74, 0.18); }
    .action-btn.accept:hover { background: var(--brand-green-dark); }
    .action-btn.decline { background: #fff1f2; color: #b91c1c; border: 1px solid #fecdd3; }
    .action-btn.decline:hover { background: #ffe4e6; }

    .reoffer-note {
      margin: 10px 0 0;
      color: var(--slate-600);
      font-size: 13px;
      line-height: 1.5;
    }

    .next-step {
      margin-top: 14px;
      border: 1px dashed #bfdbfe;
      background: #eff6ff;
      border-radius: 14px;
      padding: 14px 16px;
    }

    .next-step-label {
      margin: 0;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .next-step-title {
      margin: 8px 0 6px;
      color: #0f172a;
      font-size: 18px;
      font-weight: 900;
    }

    .next-step-copy {
      margin: 0;
      color: var(--slate-600);
      line-height: 1.55;
    }

    .my-orders-header h3 { font-size: 20px; }
    .my-orders-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .order-card-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--slate-200);
      border-radius: 16px;
      background: #ffffff;
      padding: 13px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .order-card-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(37, 99, 235, 0.45);
      box-shadow: 0 12px 24px rgba(15,23,42,.08);
    }

    .order-card-title { margin: 0 0 6px; font-size: 14px; font-weight: 900; color: var(--slate-900); }
    .order-card-meta { margin: 2px 0; color: var(--slate-600); font-size: 13px; }

    .status-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 850;
      margin-top: 8px;
    }
    .status-chip.pending { background: #fef3c7; color: #92400e; }
    .status-chip.label { background: #dbeafe; color: #1e40af; }
    .status-chip.received,
    .status-chip.processing { background: #e0e7ff; color: #3730a3; }
    .status-chip.reoffer { background: #ede9fe; color: #5b21b6; }
    .status-chip.completed { background: #d1fae5; color: #065f46; }
    .status-chip.cancelled { background: #f1f5f9; color: #475569; }
    .status-chip.default { background: #e2e8f0; color: #334155; }

    .support-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .support-item {
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 18px;
      background: rgba(255,255,255,.74);
      padding: 16px;
    }

    .support-item strong {
      display: block;
      color: var(--slate-900);
      font-weight: 900;
      margin-bottom: 5px;
    }

    .support-item span {
      color: var(--slate-600);
      font-size: 13px;
      line-height: 1.45;
    }

    .hidden { display: none !important; }
    .error { color: var(--red-600); }
    .inline-error {
      grid-column: 1 / -1;
      margin-top: 12px;
      border: 1px solid #fecaca;
      border-radius: 13px;
      background: #fef2f2;
      color: #b91c1c;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.45;
    }

    @media (max-width: 900px) {
      .hero-layout { grid-template-columns: 1fr; }
      .hero-side-card::after { display: none; }
      form { grid-template-columns: 1fr; }
      button[type="submit"] { width: 100%; }
      .status-summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .support-strip { grid-template-columns: 1fr; }
      .lookup-head { flex-direction: column; }
      .lookup-badge { white-space: normal; }
    }

  <script type="module">
    await (window.shcComponentsReady || Promise.resolve());
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import { getFirebaseApp } from '/assets/js/firebase-app.js';

    const resolveApiUrl = (path) => {
      const base = String(window.SHC_API_BASE_URL || '/api').replace(/\/$/, '');
      const endpoint = String(path || '').startsWith('/') ? path : `/${path}`;
      return new URL(`${base}${endpoint}`, window.location.origin).toString();
    };

    const apiPost = async (path, payload) => {
      const response = await fetch(resolveApiUrl(path), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload || {})
      });

      const contentType = response.headers.get('content-type') || '';
      const data = contentType.includes('application/json')
        ? await response.json()
        : await response.text();

      if (!response.ok) {
        const message = data?.error || data?.message || response.statusText || 'Request failed';
        throw new Error(message);
      }

      return data;
    };

    const app = getFirebaseApp();
    const db = getFirestore(app);

    const statusDescriptions = {
      order_pending: 'We have your order and are preparing your shipping details.',

      received: 'We received your device and are inspecting it.',
      device_received: 'We received your device and are inspecting it.',
      imei_checked: 'We received your device and are inspecting it.',
      processing: 'Our technicians are testing your device.',
      inspected: 'Our technicians are testing your device.',
      're-offered-pending': 'We sent a revised offer and are waiting for your response.',
      re_offered_pending: 'We sent a revised offer and are waiting for your response.',
      're-offered-accepted': 'You accepted the new offer—we are finalizing your payout.',
      re_offered_accepted: 'You accepted the new offer—we are finalizing your payout.',

      completed: 'Your order is complete and payment is being processed.',
      're-offered-auto-accepted': 'The revised offer was auto-accepted and payout is being finalized.',

      return_label_generated: 'A return label has been generated for your device return.',

    };

    const stageDictionary = {
      order_received: { key: 'order_received', label: 'Order received', copy: 'We have your order and are preparing your shipping details.' },
      preparing_kit: { key: 'preparing_kit', label: 'Preparing shipment', copy: 'We are preparing your prepaid label and shipping instructions.' },
      label_ready_to_send: { key: 'label_ready_to_send', label: 'Ready for shipment', copy: 'Your prepaid shipping label is ready. Please send your device to us when you are ready.' },
      kit_sent: { key: 'kit_sent', label: 'Label sent', copy: 'Your shipping details are ready. Please package your device and send it in.' },
      in_transit_to_us: { key: 'in_transit_to_us', label: 'On the way to us', copy: 'Your package is on the way to us and we are waiting to receive it.' },
      delivered_to_us: { key: 'delivered_to_us', label: 'Delivered to us', copy: 'Your package has arrived at our facility and is waiting for check-in.' },

      inspection_in_progress: { key: 'inspection_in_progress', label: 'Inspection in progress', copy: 'We are validating the condition you reported.' },
      reoffer_pending: { key: 'reoffer_pending', label: 'Action needed: updated offer', copy: 'Please accept the updated offer or decline it for a free device return. If we do not hear back within 7 regular days, the updated offer will be auto-accepted per our guidelines.' },
      reoffer_declined: { key: 'reoffer_declined', label: 'Offer declined', copy: 'We are preparing a return label to send your device back.' },
      return_label_sent: { key: 'return_label_sent', label: 'Return label sent', copy: 'A return label has been sent with return instructions.' },
      return_in_transit: { key: 'return_in_transit', label: 'Return in transit', copy: 'Your device is currently being shipped back to you.' },
      payout_sent: { key: 'payout_sent', label: 'Payout sent', copy: 'We are wrapping up payment for this order.' },
      cancelled: { key: 'cancelled', label: 'Order cancelled', copy: 'This order was cancelled.' }
    };

    const stageMap = {
      order_pending: 'order_received',
      shipping_kit_requested: 'preparing_kit',
      kit_needs_printing: 'preparing_kit',
      needs_printing: 'preparing_kit',
      label_generated: 'label_ready_to_send',
      emailed: 'label_ready_to_send',
      kit_sent: 'kit_sent',
      kit_delivered: 'kit_sent',
      kit_on_the_way_to_us: 'in_transit_to_us',
      kit_in_transit: 'in_transit_to_us',
      phone_on_the_way: 'in_transit_to_us',
      delivered_to_us: 'delivered_to_us',
      received: 'device_received',
      device_received: 'device_received',
      imei_checked: 'device_received',
      processing: 'inspection_in_progress',
      inspected: 'inspection_in_progress',
      're-offered-pending': 'reoffer_pending',
      re_offered_pending: 'reoffer_pending',
      're-offered-declined': 'reoffer_declined',
      re_offered_declined: 'reoffer_declined',
      return_label_generated: 'return_label_sent',
      return_label_sent: 'return_label_sent',
      return_in_transit: 'return_in_transit',
      're-offered-accepted': 'payout_sent',
      re_offered_accepted: 'payout_sent',
      requote_accepted: 'payout_sent',
      're-offered-auto-accepted': 'payout_sent',
      re_offered_auto_accepted: 'payout_sent',
      completed: 'payout_sent',
      cancelled: 'cancelled',
    };

    const baseFlow = ['order_received', 'preparing_kit', 'kit_sent', 'in_transit_to_us', 'delivered_to_us', 'device_received', 'inspection_in_progress', 'payout_sent'];
    const labelFlow = ['order_received', 'preparing_kit', 'label_ready_to_send', 'kit_sent', 'in_transit_to_us', 'delivered_to_us', 'device_received', 'inspection_in_progress', 'payout_sent'];
    const reofferFlow = ['order_received', 'preparing_kit', 'kit_sent', 'in_transit_to_us', 'delivered_to_us', 'device_received', 'inspection_in_progress', 'reoffer_pending', 'payout_sent'];
    const declinedReturnFlow = ['order_received', 'preparing_kit', 'kit_sent', 'in_transit_to_us', 'delivered_to_us', 'device_received', 'inspection_in_progress', 'reoffer_declined', 'return_label_sent', 'return_in_transit'];
    const cancelledFlow = ['cancelled'];

    const orderIdInput = document.getElementById('orderId');
    const customerEmailInput = document.getElementById('customerEmail');
    const form = document.getElementById('orderLookupForm');
    const submitButton = document.getElementById('submitButton');
    const formError = document.getElementById('formError');
    const manualLookupSection = document.getElementById('manualLookupSection');
    const statusCard = document.getElementById('statusCard');
    const statusPill = document.getElementById('statusPill');
    const statusTitle = document.getElementById('statusTitle');
    const statusMessage = document.getElementById('statusMessage');
    const orderSummary = document.getElementById('orderSummary');
    const customerNameValue = document.getElementById('customerNameValue');
    const payoutValue = document.getElementById('payoutValue');
    const updatedValue = document.getElementById('updatedValue');
    const progressList = document.getElementById('progressList');
    const reofferPanel = document.getElementById('reofferPanel');
    const reofferMessage = document.getElementById('reofferMessage');
    const reofferPrice = document.getElementById('reofferPrice');
    const reofferMeta = document.getElementById('reofferMeta');
    const reofferReasonsList = document.getElementById('reofferReasonsList');
    const reofferActions = document.getElementById('reofferActions');
    const reofferNote = document.getElementById('reofferNote');
    let currentOrder = null;
    let autoScrollToReoffer = false;

    function updateLookupUi() {
      manualLookupSection.classList.remove('hidden');
    }

    function refreshLookupRequirements() {
      const requiresManualLookup = true;
      orderIdInput.required = requiresManualLookup;
      customerEmailInput.required = requiresManualLookup;
    }

    function normalize(value) {
      return (value || '').trim().toLowerCase();
    }

    function normalizeOrderIdInput(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';

      const compact = raw.toUpperCase().replace(/\s+/g, '');
      const digitsOnly = compact.replace(/\D/g, '');
      if (digitsOnly) {
        return `SHC-${digitsOnly}`;
      }

      if (compact.startsWith('SHC-')) {
        return compact;
      }

      if (compact.startsWith('SHC')) {
        return `SHC-${compact.slice(3)}`;
      }

      return compact;
    }

    function friendlyStatus(status) {
      if (!status) return 'Unknown';
      if (statusDescriptions[status]) {
        return statusDescriptions[status].split('—')[0] || statusDescriptions[status];
      }
      return status
        .replace(/_/g, ' ')
        .replace(/\b\w/g, (m) => m.toUpperCase());
    }

    function statusDetail(status) {
      return statusDescriptions[status] || 'We are working on your order. Reach out if you need an update.';
    }

    function formatCurrency(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return '—';
      return numeric.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
    }

    function toMillis(value) {
      if (!value) return null;
      if (typeof value === 'number') return value;
      if (typeof value.toMillis === 'function') return value.toMillis();
      if (typeof value === 'object') {
        const seconds = value._seconds ?? value.seconds ?? null;
        if (typeof seconds === 'number') {
          const nanos = value._nanoseconds ?? value.nanoseconds ?? 0;
          return seconds * 1000 + Math.floor(nanos / 1e6);
        }
      }
      return null;
    }

    function resolveUpdatedAt(order = {}) {
      const candidates = [order.updatedAt, order.updated_at, order.statusUpdatedAt, order.status_updated_at, order.createdAt, order.created_at];
      for (const candidate of candidates) {
        const millis = toMillis(candidate);
        if (millis) return new Date(millis);
      }
      return null;
    }

    function resolveFlow(normalizedStatus) {
      if (normalizedStatus === 'cancelled') return cancelledFlow;
      if (normalizedStatus === 'label_generated' || normalizedStatus === 'emailed') return labelFlow;
      if (normalizedStatus === 're-offered-pending' || normalizedStatus === 're_offered_pending') return reofferFlow;
      if (normalizedStatus === 're-offered-declined' || normalizedStatus === 're_offered_declined' || normalizedStatus === 'return_label_generated' || normalizedStatus === 'return_label_sent' || normalizedStatus === 'return_in_transit') return declinedReturnFlow;
      return baseFlow;
    }

    function renderProgress(statusKey) {
      const normalized = normalize(statusKey);
      const stageKey = stageMap[normalized] || 'order_received';
      const flow = resolveFlow(normalized);
      const currentIndex = flow.findIndex((key) => key === stageKey);
      const lastVisibleIndex = currentIndex >= 0 ? currentIndex : 0;
      progressList.innerHTML = '';
      flow.slice(0, lastVisibleIndex + 1).forEach((stageKeyInFlow, index) => {
        const stage = stageDictionary[stageKeyInFlow];
        if (!stage) return;
        const li = document.createElement('li');
        li.className = 'progress-item';
        if (index < lastVisibleIndex) li.classList.add('complete');
        if (index === lastVisibleIndex) li.classList.add('current');

        const dot = document.createElement('span');
        dot.className = 'dot';

        const content = document.createElement('div');
        content.className = 'content';

        const title = document.createElement('h4');
        title.textContent = stage.label;

        const copy = document.createElement('p');
        copy.textContent = stage.copy;

        content.appendChild(title);
        content.appendChild(copy);
        li.appendChild(dot);
        li.appendChild(content);
        progressList.appendChild(li);
      });
    }

    function resolveOrderEmail(order = {}) {
      return normalize(
        order?.shippingInfo?.email ||
          order?.email ||
          order?.contactEmail ||
          order?.customerEmail ||
          order?.userEmail
      );
    }

    async function fetchOrder(orderId, email) {
      const orderRef = doc(db, 'orders', orderId);
      const snapshot = await getDoc(orderRef);

      if (!snapshot.exists()) {
        throw new Error('Unable to find that order.');
      }

      const order = { id: snapshot.id, ...snapshot.data() };
      const orderEmail = resolveOrderEmail(order);
      const enteredEmail = normalize(email);

      if (!orderEmail) {
        throw new Error('This order does not have an email on file. Please contact support.');
      }

      if (enteredEmail !== orderEmail) {
        throw new Error('The email you entered does not match the email on the order.');
      }

      return order;
    }


    function getReofferPayload(order = {}) {
      const offer = order?.reOffer || order?.reoffer || null;
      if (!offer || typeof offer !== 'object') return null;
      const rawPrice = offer.newPrice ?? offer.price ?? null;
      const price = Number(rawPrice);
      const reasons = Array.isArray(offer.reasons) ? offer.reasons.filter(Boolean) : [];
      return {
        price: Number.isFinite(price) ? price : null,
        reasons,
      };
    }

    function getDeviceReofferEntries(order = {}) {
      const byDevice = order?.reOfferByDevice || order?.reofferByDevice || {};
      const statusByKey = order?.deviceStatusByKey || {};
      const entries = Object.entries(byDevice).map(([deviceKey, offer]) => {
        const rawPrice = offer?.newPrice ?? offer?.price ?? null;
        const parsedPrice = Number(rawPrice);
        return {
          deviceKey,
          label: `Device ${(String(deviceKey).split('::')[1] || '0') * 1 + 1}`,
          status: normalize(statusByKey?.[deviceKey] || order?.status || ''),
          price: Number.isFinite(parsedPrice) ? parsedPrice : null,
          reasons: Array.isArray(offer?.reasons) ? offer.reasons.filter(Boolean) : []
        };
      });
      if (entries.length) return entries;
      const orderLevel = getReofferPayload(order);
      if (!orderLevel) return [];
      return [{
        deviceKey: null,
        label: 'Order offer',
        status: normalize(order?.status || ''),
        price: orderLevel.price,
        reasons: orderLevel.reasons,
      }];
    }

    function getEffectiveProgressStatus(order = {}) {
      const deviceOffers = getDeviceReofferEntries(order);
      if (deviceOffers.some((entry) => entry.status === 're-offered-pending' || entry.status === 're_offered_pending')) {
        return 're_offered_pending';
      }
      if (deviceOffers.some((entry) => entry.status === 're-offered-declined' || entry.status === 're_offered_declined')) {
        return 're_offered_declined';
      }
      return normalize(order?.status) || 'order_pending';
    }

    function resetReofferPanel() {
      reofferPanel.classList.add('hidden');
      reofferMeta.classList.add('hidden');
      reofferActions.classList.add('hidden');
      reofferReasonsList.innerHTML = '';
      reofferMessage.textContent = '';
      reofferPrice.textContent = '—';
      reofferNote.textContent = '';
      reofferActions.innerHTML = '';
    }

    function renderReofferPanel(order) {
      resetReofferPanel();
      const statusKey = normalize(order?.status);
      const deviceOffers = getDeviceReofferEntries(order);
      const hasReofferContext = statusKey.includes('re-offered') || statusKey.includes('reoffer') || deviceOffers.length > 0;
      if (!hasReofferContext) return;

      reofferPanel.classList.remove('hidden');
      const pendingOffers = deviceOffers.filter((entry) => entry.status === 're-offered-pending' || entry.status === 're_offered_pending');

      if (pendingOffers.length) {
        reofferMessage.textContent = pendingOffers.length > 1
          ? 'Some devices have new offers based on our team inspection. Please review each one below.'
          : 'Your device has a new offer based on our team inspection. Please review it below.';
        reofferPrice.textContent = pendingOffers.length === 1 && pendingOffers[0].price != null
          ? formatCurrency(pendingOffers[0].price)
          : `${pendingOffers.length} pending re-offer${pendingOffers.length === 1 ? '' : 's'}`;
        reofferActions.classList.remove('hidden');
        reofferNote.textContent = 'Please respond to each device offer. If we do not hear back within 7 regular days, the updated offer will be auto-accepted. If you decline, we can return the device to you free of charge.';

        pendingOffers.forEach((entry) => {
          const wrapper = document.createElement('div');
          wrapper.className = 'reoffer-device-card';

          const title = document.createElement('div');
          title.className = 'reoffer-device-title';
          title.textContent = entry.label;
          wrapper.appendChild(title);

          const summary = document.createElement('p');
          summary.className = 'reoffer-copy';
          summary.innerHTML = `Updated offer: <strong>${entry.price != null ? formatCurrency(entry.price) : 'Updated price available'}</strong>`;
          wrapper.appendChild(summary);

          if (entry.reasons.length) {
            const meta = document.createElement('div');
            meta.className = 'reoffer-meta';
            const reasonTitle = document.createElement('strong');
            reasonTitle.textContent = 'Reasoning from inspection:';
            meta.appendChild(reasonTitle);
            const ul = document.createElement('ul');
            entry.reasons.forEach((reason) => {
              const li = document.createElement('li');
              li.textContent = reason;
              ul.appendChild(li);
            });
            meta.appendChild(ul);
            wrapper.appendChild(meta);
          }

          const actions = document.createElement('div');
          actions.className = 'reoffer-actions';
          actions.innerHTML = `
            <button type="button" class="action-btn accept" data-reoffer-action="accept" data-device-key="${entry.deviceKey || ''}">Accept offer</button>
            <button type="button" class="action-btn decline" data-reoffer-action="decline" data-device-key="${entry.deviceKey || ''}">Decline and return my device</button>
          `;
          wrapper.appendChild(actions);
          reofferActions.appendChild(wrapper);
        });
        return;
      }

      if (deviceOffers.some((entry) => ['re-offered-accepted','re_offered_accepted','re-offered-auto-accepted','re_offered_auto_accepted','requote_accepted'].includes(entry.status))) {
        reofferMessage.textContent = 'One or more updated offers have been accepted.';
        reofferPrice.textContent = 'Accepted';
        reofferNote.textContent = 'We are finalizing payout for accepted devices.';
        return;
      }

      if (deviceOffers.some((entry) => entry.status === 're-offered-declined' || entry.status === 're_offered_declined')) {
        reofferMessage.textContent = 'One or more updated offers were declined.';
        reofferPrice.textContent = 'Declined';
        reofferNote.textContent = 'Return processing will be prepared for declined devices.';
      }
    }

    async function submitReofferDecision(action, deviceKey = null, triggerButton = null) {
      if (!currentOrder?.id) return;
      const isAccept = action === 'accept';
      const button = triggerButton;
      const originalText = button ? button.textContent : '';
      try {
        if (button) {
          button.disabled = true;
          button.textContent = isAccept ? 'Accepting…' : 'Declining…';
        }
        await apiPost(isAccept ? '/accept-offer-action' : '/return-phone-action', { orderId: currentOrder.id, deviceKey: deviceKey || null });
        const refreshed = await fetchOrder(currentOrder.id, customerEmailInput.value.trim());
        currentOrder = refreshed;
        displayOrder(refreshed);
      } catch (error) {
        formError.textContent = error?.message || 'Unable to update your re-offer decision right now.';
        formError.classList.remove('hidden');
      } finally {
        if (button) {
          button.textContent = originalText;
          button.disabled = false;
        }
      }
    }

    function maybeScrollToReofferPanel() {
      if (!autoScrollToReoffer) return;
      if (reofferPanel.classList.contains('hidden')) return;
      autoScrollToReoffer = false;
      reofferPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function displayOrder(order) {
      currentOrder = order;
      const statusKey = normalize(order.status) || 'order_pending';
      const progressStatusKey = getEffectiveProgressStatus(order);
      statusPill.textContent = friendlyStatus(statusKey);
      statusTitle.textContent = `Status: ${friendlyStatus(statusKey)}`;
      statusMessage.textContent = statusDetail(statusKey);

      const deviceText = order.device || order.deviceName || 'Device order';
      orderSummary.textContent = `${order.id || order.orderId || 'Order'} • ${deviceText}`;

      customerNameValue.textContent = order?.shippingInfo?.fullName || order?.shippingInfo?.name || '—';
      payoutValue.textContent = formatCurrency(order.totalPayout ?? order.estimatedQuote ?? order.originalQuote);

      const updated = resolveUpdatedAt(order);
      updatedValue.textContent = updated ? updated.toLocaleString() : '—';

      renderProgress(progressStatusKey);
      renderReofferPanel(order);
      statusCard.classList.remove('hidden');
      statusCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      maybeScrollToReofferPanel();
    }

    function setLoading(isLoading) {
      submitButton.disabled = isLoading;
      submitButton.textContent = isLoading ? 'Checking…' : 'Check status';
    }

    function showError(message) {
      formError.textContent = message;
      formError.classList.remove('hidden');
      statusCard.classList.add('hidden');
      resetReofferPanel();
    }

    updateLookupUi();
    refreshLookupRequirements();

    reofferActions.addEventListener('click', (event) => {
      const btn = event.target.closest('[data-reoffer-action]');
      if (!btn) return;
      submitReofferDecision(btn.dataset.reofferAction, btn.dataset.deviceKey || null, btn);
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      await runOrderLookup();
    });

    async function runOrderLookup() {
      formError.classList.add('hidden');

      const orderId = normalizeOrderIdInput(orderIdInput.value);
      const email = customerEmailInput.value.trim();

      if (!orderId) {
        showError('Please enter your order ID.');
        return false;
      }

      if (!email) {
        showError('Please enter the email used on the order.');
        return false;
      }

      orderIdInput.value = orderId;

      try {
        setLoading(true);
        const order = await fetchOrder(orderId, email);
        displayOrder(order);
        return true;
      } catch (error) {
        showError(error.message || 'Unable to find your order. Please double-check the details.');
        return false;
      } finally {
        setLoading(false);
      }
    }

    async function applyPrefillFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const idFromUrl = params.get('orderId') || params.get('id');
      const emailFromUrl = params.get('email');

      autoScrollToReoffer = params.get('scrollToReoffer') === '1' || params.get('fromReofferLink') === '1';

      if (idFromUrl) {
        orderIdInput.value = normalizeOrderIdInput(idFromUrl);
      }
      if (emailFromUrl) {
        customerEmailInput.value = emailFromUrl;
      }

      updateLookupUi();
      refreshLookupRequirements();

      if (idFromUrl && emailFromUrl) {
        await runOrderLookup();
      }
    }

    applyPrefillFromUrl();
  </script>

  <script type="module">
    await (window.shcComponentsReady || Promise.resolve());
    await window.shcLoadSharedSiteScripts?.({ includeAuth: true });
  </script>
