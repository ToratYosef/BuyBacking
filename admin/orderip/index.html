<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin IP Conflict Monitor</title>
  <link rel="stylesheet" href="/assets/css/output.css" />
</head>
<body class="bg-slate-100 min-h-screen text-slate-900">
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold">Order IP Conflict Monitor</h1>
    <p class="mt-2 text-sm text-slate-600">
      Flags IP addresses that submitted orders under multiple customer names.
    </p>

    <section class="mt-6 bg-white rounded-xl shadow p-4">
      <div class="flex flex-wrap gap-3 items-end">
        <label class="text-sm">
          Scan limit
          <input id="scan-limit" type="number" min="1" max="2000" value="500" class="block mt-1 border rounded px-3 py-2 w-40" />
        </label>
        <button id="refresh-btn" class="bg-blue-600 hover:bg-blue-700 text-white rounded px-4 py-2">Refresh</button>
      </div>
      <p id="summary" class="mt-3 text-sm text-slate-700"></p>
    </section>

    <section class="mt-6">
      <div id="results" class="space-y-4"></div>
    </section>
  </main>

  <script type="module" src="/assets/js/pages/admin-orderip.js"></script>
</body>
</html>
