    async function autoDownloadPdf(url, filename = "shipping-label.pdf") {
      if (!url) return;
      try {
        const response = await withPerf(`network:fetchJson:${url}`, () => fetch(url));
        if (!response.ok) throw new Error("download failed");
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
      } catch {
        const a = document.createElement("a");
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
      }
    }

    function getOrderPayoutTotal(order) {
      const explicit = Number(order?.totalPayout ?? order?.total_payout ?? order?.payoutTotal ?? order?.payout_total ?? NaN);
      if (Number.isFinite(explicit)) return explicit;
      const items = Array.isArray(order?.items) ? order.items : [];
      if (!items.length) {
        const single = Number(order?.price ?? order?.payout ?? 0);
        return Number.isFinite(single) ? single : 0;
      }
      let sum = 0;
      for (const it of items) {
        const qty = normalizeQty(it?.qty ?? it?.quantity ?? 1);
        const unit = Number.parseFloat(it?.price ?? it?.payout ?? 0);
        sum += (Number.isFinite(unit) ? unit : 0) * qty;
      }
      return sum;
    }

    function getDeviceUnlockInfo(order, deviceKey) {
      if (!order || !deviceKey) return null;
      const fromDeviceMap = order?.unlockInfoByDevice?.[deviceKey];
      const fromIssueMap = order?.qcIssuesByDevice?.[deviceKey]?.password_locked?.unlockInfo;
      const source = fromDeviceMap || fromIssueMap;
      if (!source || typeof source !== 'object') return null;

      const method = String(source.method || '').trim().toLowerCase();
      if (!['pin', 'password', 'pattern'].includes(method)) return null;
      const value = String(source.value || '').trim();
      let patternPath = Array.isArray(source.patternPath)
        ? source.patternPath.map((value) => Number(value)).filter((value) => Number.isFinite(value) && value >= 1 && value <= 9)
        : [];

      if (!patternPath.length && method === 'pattern' && value) {
        patternPath = value
          .split(/[^0-9]+/)
          .map((value) => Number(value))
          .filter((value) => Number.isFinite(value) && value >= 1 && value <= 9);
      }

      return {
        reason: source.reason || 'password_locked',
        method,
        value,
        patternPath,
        updatedAt: source.updatedAt || null,
      };
    }

    function isScreenLockOnlyResolved(order, deviceKey) {

      const lockIssue = issues.password_locked;

    const DEVICE_ISSUE_REASON_LABELS = {
      outstanding_balance: 'Balance due',
      password_locked: 'Password locked',
      stolen: 'Blacklist / stolen',
      fmi_active: 'FMI / activation lock',
    };
    function getDeviceIssueEntries(order, deviceKey) {
      if (!order || !deviceKey) return [];
      const issueMap = order?.qcIssuesByDevice?.[deviceKey];
      if (!issueMap || typeof issueMap !== 'object' || Array.isArray(issueMap)) return [];
      return Object.entries(issueMap)
        .map(([rawReason, issue]) => {
          const normalizedReason = String(issue?.reason || rawReason || '').trim().toLowerCase();
          const updatedAt = toDateAny(issue?.updatedAt || issue?.createdAt || issue?.emailSentAt || order?.lastConditionEmailSentAt || null);
          const resolved = Boolean(issue?.resolved || issue?.resolvedAt);
          return {
            reason: normalizedReason,
            label: DEVICE_ISSUE_REASON_LABELS[normalizedReason] || normalizedReason.replace(/_/g, ' '),
            resolved,
            updatedAt,
          };
        })
        .filter((entry) => entry.reason);
    }
    function getUnresolvedDeviceIssues(order, deviceKey) {
      return getDeviceIssueEntries(order, deviceKey).filter((entry) => !entry.resolved);
    }
    function getDeviceResponseDueAtMillis(order, deviceKey) {
      const unresolvedIssues = getUnresolvedDeviceIssues(order, deviceKey);
      if (!unresolvedIssues.length) return null;
      const oldestIssueAt = unresolvedIssues
        .map((entry) => entry.updatedAt)
        .filter(Boolean)
        .sort((a, b) => a.getTime() - b.getTime())[0] || null;
      if (!oldestIssueAt) return null;
      return oldestIssueAt.getTime() + (7 * 24 * 60 * 60 * 1000);
    }
    function formatResponseTimeLeft(targetDate) {
      const due = toDateAny(targetDate);
      if (!due) return '';
      const diffMs = due.getTime() - Date.now();
      if (diffMs <= 0) return 'timer expired';
      const dayMs = 1000 * 60 * 60 * 24;
      const hourMs = 1000 * 60 * 60;
      const minuteMs = 1000 * 60;
      const days = Math.floor(diffMs / dayMs);
      const hours = Math.floor((diffMs % dayMs) / hourMs);
      const minutes = Math.floor((diffMs % hourMs) / minuteMs);
      if (days > 0) return `${days}d ${hours}h left`;
      if (hours > 0) return `${hours}h ${minutes}m left`;
      return `${Math.max(1, minutes)}m left`;
    }

    function normalizeCarrierForPricing(value) {
      const v = String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!v) return 'unlocked';
      if (v.includes('tmobile') || v === 'tmo') return 'tmobile';
      if (v.includes('att')) return 'att';
      if (v.includes('verizon')) return 'verizon';
      if (v.includes('unlock')) return 'unlocked';
      if (v.includes('other')) return 'other';
      return v;
    }

    async function getQcOfferFromDb(order, qcData = null) {
      const focused = getFocusedDevice(order);
      const item = focused?.entry?.item || order || {};
      const brand = String(qcData?.actualBrand || item.brand || order.brand || '').toLowerCase();
      const modelId = qcData?.actualModelId || item.modelId || item.model || order.modelId || order.model;
      const storage = String((qcData?.storageMatch === 'no' ? qcData?.actualStorage : qcData?.storage) || item.storage || order.storage || '');
      const carrier = normalizeCarrierForPricing(qcData?.carrier || item.carrier || item.lock || order.carrier || order.lock || 'unlocked');
      const conditionRaw = String(qcData?.condition || item.condition || order.condition || 'good').toLowerCase();
      const condition = (conditionRaw === 'damaged' ? 'broken' : conditionRaw);
      if (!brand || !modelId || !storage) return null;
      try {
        const snap = await withPerf(`firestore:getModel:${brand}:${modelId}`, () => getDoc(doc(db, 'devices', brand, 'models', modelId)));
        if (!snap.exists()) return null;
        const data = snap.data() || {};
        const prices = data.prices || {};
        const storageMap = prices[storage] || prices[String(storage).toUpperCase()] || prices[String(storage).toLowerCase()];
        if (!storageMap) return null;
        const carrierMap = storageMap[carrier] || storageMap.unlocked || storageMap.other;
        if (!carrierMap) return null;
        if (condition === 'no_power') {
          const brokenOffer = Number(carrierMap.broken ?? carrierMap.damaged ?? 0);
          const derivedNoPowerOffer = Number.isFinite(brokenOffer) ? Math.round((brokenOffer * 0.5) * 100) / 100 : 0;
          return Number.isFinite(derivedNoPowerOffer) ? derivedNoPowerOffer : null;
        }
        const directOffer = Number(carrierMap[condition]);
        if (Number.isFinite(directOffer) && directOffer > 0) return directOffer;
        return null;
      } catch {
        return null;
      }
    }

    function composeReofferReasoning(order, qcData = null, computedPrice = null) {
      const reasons = [];
      if (!qcData) return reasons;
      if (qcData.deviceMatch === 'no') reasons.push('Device received does not match the original model selection.');
      if (qcData.storageMatch === 'no') reasons.push('Storage/GB amount differs from what was quoted.');
      
      // Add broken issues if condition is broken
      if (['broken', 'no_power'].includes(qcData.condition) && qcData.brokenIssues && qcData.brokenIssues.length > 0) {
        const issueLabels = {
          'mic': 'Microphone not working',
          'camera': 'Camera not working',
          'crackedFront': 'Cracked front screen',
          'crackedBack': 'Cracked back glass',
          'lcdDeadSpots': 'LCD dead spots',
          'volumeButtons': 'Volume buttons not working',
          'powerButton': 'Power button not working',
          'touchNotWorking': 'Touch screen not working',
          'speaker': 'Speaker not working',
          'batteryIssue': 'Battery issue',
          'wifiIssue': 'WiFi/Bluetooth not working'
        };
        qcData.brokenIssues.forEach(issueId => {
          if (issueLabels[issueId]) {
            reasons.push(issueLabels[issueId]);
          }
        });
      }
      
      // Add other custom issue if specified
      if (['broken', 'no_power'].includes(qcData.condition) && qcData.otherIssue && qcData.otherIssue.trim()) {
        reasons.push(qcData.otherIssue.trim());
      }
      
      if (qcData.isLocked === 'yes') reasons.push('Screen lock / passcode is still active.');
      if (qcData.hasFmi === 'yes') reasons.push('FMI / iCloud / FRP / Google lock is still active.');
      if (qcData.hasBalance === 'yes') reasons.push('Outstanding carrier/financing balance is present.');
      if (qcData.notes) reasons.push(`Inspector notes: ${qcData.notes}`);
      return reasons;
    }

    function validateReofferDraft({ price, reasons, comments }) {
      const fields = {};
      if (!Number.isFinite(price) || price <= 0) fields.price = true;

      return {

    function buildSeventyFiveLessReofferDraft(order, deviceKey = null, currentStatus = '') {
      const targetDeviceKey = deviceKey || state.qcDeviceKey || state.selectedDeviceKey || buildOrderDeviceKey(order?.id, 0);
      const originalPrice = Number(getOriginalReofferCap(order, targetDeviceKey));
      if (!Number.isFinite(originalPrice) || originalPrice <= 0) return null;
      const reducedPrice = Number((originalPrice * 0.25).toFixed(2));
      if (!Number.isFinite(reducedPrice) || reducedPrice <= 0) return null;

      const normalizedStatus = normalizeStatusKey(currentStatus || getDeviceStatus(order, targetDeviceKey) || order?.status || '');
      let reasonText = 'Revised offer set at 75% less than the quoted amount after post-receipt review.';
      if (normalizedStatus === 'emailed') {
        reasonText = 'Required issue remains unresolved, so this revised offer is set at 75% less than the quoted amount.';
      } else if (normalizedStatus === 'issue_resolved') {
        reasonText = 'The reported issue was still unsolved, so this revised offer is set at 75% less than the quoted amount.';
      }

      return {
        deviceKey: targetDeviceKey,
        newPrice: reducedPrice,
        reasons: [reasonText],
        comments: normalizedStatus === 'issue_resolved'
          ? `75%-less re-offer sent from admin because the reported issue was still unsolved. Original quote: $${originalPrice.toFixed(2)}. Revised offer: $${reducedPrice.toFixed(2)}.`
          : `75%-less re-offer sent from admin. Original quote: $${originalPrice.toFixed(2)}. Revised offer: $${reducedPrice.toFixed(2)}.`
      };
    }

    async function openReofferModal(order, qcData = null) {
      const entries = getOrderDeviceEntries(order);
      const selectedKey = state.qcDeviceKey || state.selectedDeviceKey || buildOrderDeviceKey(order.id, 0);

      const currentOrderStatus = normalizeStatusKey(order.status);
      const preReceiveStatuses = ['order_pending', 'needs_printing', 'label_generated', 'kits', 'phone_on_the_way', 'delivered_to_us'];
      if (preReceiveStatuses.includes(currentOrderStatus)) {

      // Get all devices from order (qty-expanded for consistent per-device status)
      const entries = getOrderDeviceEntries(order);

      const deviceStatuses = entries.map((entry) => {
        const deviceKey = buildOrderDeviceKey(order.id, entry.deviceIndex);

      // Single-device orders should mirror the only device status exactly.
      if (deviceStatuses.length === 1) {

        're-offered-pending': 4,
        're-offered-declined': 5,
        'completed': 6,

      let minPriority = Infinity;

          minStatus = status;

      for (const entry of entries) {

      const allowed = new Set(["label_generated", "phone_on_the_way"]);
      const candidates = base.filter(o => {
        const status = normalizeStatusKey(o?.status);
        return allowed.has(status);
      });

      if (!candidates.length) {
        toast("No label-generated / phone-on-the-way tracking candidates found", "info");
        return;
      }

      const ok = await showConfirmation({
        title: 'Refresh Tracking',
        message: `Refresh tracking for ${candidates.length} orders in Label Generated / Phone On The Way?`,
        confirmText: 'Refresh',
        cancelText: 'Cancel',
        confirmClass: 'bg-blue-600 hover:bg-blue-700',
      });
      if (!ok) return;

      const originalText = buttonEl?.textContent;
      state.bulkTrackingRefreshInProgress = true;
      if (buttonEl) {
        buttonEl.disabled = true;
        buttonEl.textContent = `Refreshing 0/${candidates.length}…`;
      }
      try {
        const queue = candidates.slice();
        let success = 0;
        let failed = 0;
        let done = 0;
        let statusChanged = 0;
        const samples = { failed: [] };
        const latestStatusByOrderId = new Map(candidates.map((o) => [o.id, normalizeStatusKey(o?.status)]));

        const updateProgressText = () => {
          const liveBtn = document.getElementById("refresh-label-phone-tracking") || buttonEl;
          if (liveBtn) {
            liveBtn.disabled = true;
            liveBtn.textContent = `Refreshing ${done}/${candidates.length}…`;
          }
        };

        async function worker() {
          while (queue.length) {
            const order = queue.shift();
            if (!order) return;
            try {
              const refreshType = matchesKitTrackingHints(order) ? "kit" : "email";
              const res = await apiPost(`/refresh-tracking`, { orderId: order.id, type: refreshType });
              const previousStatus = normalizeStatusKey(order?.status);
              const nextStatus = normalizeStatusKey(res?.order?.status || order?.status);
              latestStatusByOrderId.set(order.id, nextStatus);
              if (nextStatus && previousStatus && nextStatus !== previousStatus) {
                statusChanged++;
              }
              success++;
            } catch (e) {
              failed++;
              if (samples.failed.length < 5) samples.failed.push(`#${order.id}: ${e?.message || "failed"}`);
            } finally {
              done++;
              updateProgressText();
            }
          }
        }

        const workers = Array.from({ length: Math.min(MAX_CONCURRENT_TRACKING_REQUESTS, candidates.length) }, () => worker());
        await Promise.all(workers);

        state.lastTrackingRefreshMeta = { at: new Date(), source: "admin_manual" };

        const nowCounts = {
          label_generated: 0,
          phone_on_the_way: 0,
          delivered_to_us: 0,
        };
        for (const value of latestStatusByOrderId.values()) {
          if (value === "label_generated") nowCounts.label_generated++;
          if (value === "phone_on_the_way") nowCounts.phone_on_the_way++;
          if (value === "delivered_to_us") nowCounts.delivered_to_us++;
        }

        state.trackingReportData = {
          processed: candidates.length,
          refreshed: success,
          statusChanged,
          failed,
          statusCounts: nowCounts,
          completedAtLabel: `Completed ${formatTimeOnly(new Date())} (admin manual)`,
        };
        state.trackingReportModalOpen = true;
      } finally {
        state.bulkTrackingRefreshInProgress = false;
        const liveBtn = document.getElementById("refresh-label-phone-tracking") || buttonEl;
        if (liveBtn) {
          liveBtn.disabled = false;
          liveBtn.textContent = originalText || "Refresh";
        }
        filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
      }
    }
    async function runAdminBulkVoidAction(buttonEl, {
      endpoint,
      confirmText,
      loadingLabel,
      inProgressStateKey,
      body = {},
    }) {
      if (!buttonEl || !endpoint || !inProgressStateKey) return;
      if (state[inProgressStateKey]) return;

      const ok = await showConfirmation({
        title: 'Confirm Bulk Action',
        message: confirmText || 'Run bulk void action?',
        confirmText: 'Run',
        cancelText: 'Cancel',
        confirmClass: 'bg-rose-600 hover:bg-rose-700',
      });
      if (!ok) return;

      const originalText = buttonEl.textContent;
      state[inProgressStateKey] = true;
      state.bulkVoidProgressVisible = true;
      state.bulkVoidProgressLabel = loadingLabel || "Processing…";
      state.bulkVoidProgressPercent = 0;
      state.bulkVoidProgressDetails = "Starting…";
      buttonEl.disabled = true;
      buttonEl.textContent = loadingLabel || "Processing…";
      render();

      try {
        let totalCancelled = 0;
        let totalDeleted = 0;
        let totalSkipped = 0;
        let totalFailed = 0;
        let totalScanned = 0;
        let batchCount = 0;
        let hasMore = true;
        const skippedSamples = [];
        const failedSamples = [];

        while (hasMore) {
          batchCount += 1;
          const result = await apiPost(endpoint, body);
          const cancelled = Number(result?.cancelled || 0);
          const deleted = Number(result?.deleted || 0);
          const skipped = Number(result?.skipped || 0);
          const failed = Number(result?.failed || 0);
          const scanned = Number(result?.scanned || 0);
          const totalCandidates = Number(result?.totalCandidates || scanned);

          totalCancelled += cancelled;
          totalDeleted += deleted;
          totalSkipped += skipped;
          totalFailed += failed;
          totalScanned += scanned;

          const nextSkipped = Array.isArray(result?.skippedEntries)
            ? result.skippedEntries.slice(0, 5).map((entry) => `#${entry.orderId}: ${entry.reason}`)
            : [];
          const nextFailed = Array.isArray(result?.failedEntries)
            ? result.failedEntries.slice(0, 5).map((entry) => `#${entry.orderId}: ${entry.reason}`)
            : [];

          for (const sample of nextSkipped) {
            if (skippedSamples.length >= 5) break;
            skippedSamples.push(sample);
          }
          for (const sample of nextFailed) {
            if (failedSamples.length >= 5) break;
            failedSamples.push(sample);
          }

          hasMore = Boolean(result?.hasMore);

          const remainingEstimate = hasMore ? Math.max(0, totalCandidates - scanned) : 0;
          const estimatedTotal = Math.max(totalScanned + remainingEstimate, 1);
          const rawPercent = Math.round((totalScanned / estimatedTotal) * 100);
          const progressPercent = hasMore ? Math.min(97, rawPercent) : 100;

          state.bulkVoidProgressLabel = loadingLabel || "Processing…";
          state.bulkVoidProgressPercent = progressPercent;
          state.bulkVoidProgressDetails = `Batch ${batchCount}: scanned ${totalScanned}, cancelled ${totalCancelled}, deleted ${totalDeleted}, skipped ${totalSkipped}, failed ${totalFailed}`;
          render();

          if (!hasMore) {
            break;
          }
        }

        state.bulkVoidProgressPercent = 100;
        state.bulkVoidProgressDetails = `Done: scanned ${totalScanned}, cancelled ${totalCancelled}, deleted ${totalDeleted}, skipped ${totalSkipped}, failed ${totalFailed}`;
        render();

        await showInfoModal({
          title: 'Bulk Action Complete',
          message:
            `Scanned: ${totalScanned}\n` +
            `Cancelled: ${totalCancelled}\n` +
            `Deleted: ${totalDeleted}\n` +
            `Skipped: ${totalSkipped}\n` +
            `Failed: ${totalFailed}\n\n` +
            (skippedSamples.length ? `Skipped samples:\n- ${skippedSamples.join("\n- ")}\n\n` : '') +
            (failedSamples.length ? `Failed samples:\n- ${failedSamples.join("\n- ")}\n` : ''),
          confirmText: 'Done',
        });
      } catch (error) {
        toast(error?.message || "Bulk void action failed", "error");
      } finally {
        state[inProgressStateKey] = false;
        state.bulkVoidProgressVisible = false;
        state.bulkVoidProgressLabel = "";
        state.bulkVoidProgressPercent = 0;
        state.bulkVoidProgressDetails = "";
        const liveBtn = document.getElementById(buttonEl.id) || buttonEl;
        if (liveBtn) {
          liveBtn.disabled = false;
          liveBtn.textContent = originalText || "Run";
        }
        filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
      }
    }

          const notFoundIds = Array.isArray(response?.notFound) ? response.notFound.map((id) => String(id)) : [];
          const failedEntries = Array.isArray(response?.failed) ? response.failed : [];

          deleted += deletedIds.length;

        }

        processed += batchOrderIds.length;
        const batchNumber = Math.floor(i / batchSize) + 1;
        state.bulkVoidProgressPercent = Math.round((processed / cancelledOrderIds.length) * 100);

    function getLabelOptions(order) {
      // Returns array of { key, id, label }
      const opts = [];
      const seenIds = new Set();
      for (const { key, value } of getShipEngineLabelEntries(order)) {
        const status = String(value?.voidStatus || value?.status || value?.state || "active").toLowerCase();
        if (status === "voided" || value?.voidedAt) continue;
        const id = value?.labelId || value?.label_id || value?.id;
        if (!id || seenIds.has(String(id))) continue;
        seenIds.add(String(id));
        const tracking = value?.trackingNumber || value?.tracking_number || "";
        const display = value?.displayName || key || "ShipEngine Label";
        opts.push({ key: String(key), id: String(id), label: `${display}${tracking ? ` (${tracking})` : ""}` });
      }
      if (order?.shippingLabelId && !seenIds.has(String(order.shippingLabelId))) {
        opts.push({ key: "primary", id: String(order.shippingLabelId), label: "Primary Label" });
        seenIds.add(String(order.shippingLabelId));
      }
      if (order?.easypostLabelId && !seenIds.has(String(order.easypostLabelId))) {
        opts.push({ key: "easypost", id: String(order.easypostLabelId), label: "EasyPost Label" });
      }
      const returnLabelId =
        order?.returnLabelId ||
        order?.shipEngineLabels?.returnLabel?.id ||
        order?.shipEngineLabels?.returnLabel?.labelId ||
        order?.shipEngineLabels?.returnLabel?.label_id ||
        null;
      if (returnLabelId && !seenIds.has(String(returnLabelId))) {
        const tracking = order?.returnTrackingNumber || order?.shipEngineLabels?.returnLabel?.trackingNumber || order?.shipEngineLabels?.returnLabel?.tracking_number || "";
        opts.push({ key: "returnLabel", id: String(returnLabelId), label: `Return Label${tracking ? ` (${tracking})` : ""}` });
        seenIds.add(String(returnLabelId));
      }
      return opts;
    }
    async function requestVoidLabels(orderId, selections) {

            'reOffer75Less': 'Send a re-offer for 75% less?\n\nThis sends a normal re-offer email and the customer can accept or decline it on the re-offer page.',
            'markCompleted': 'Mark this order as completed?\n\nThis will finalize the order and may trigger payment processing.',
            'autoRequote': 'Send 75%-less re-offer?\n\nThis will email the customer per terms and move the selected device(s) to Re-offer Pending at 75% less.',
            'cancelOrder': 'Cancel this order?\n\nThis action will cancel the order and may void any labels.',
            'deleteOrder': 'Delete this order permanently?\n\nThis action cannot be undone!'
          };
          const confirmClasses = {
            'deleteOrder': 'bg-rose-600 hover:bg-rose-700',
            'cancelOrder': 'bg-orange-600 hover:bg-orange-700',
            'autoRequote': 'bg-amber-600 hover:bg-amber-700',
            'reOffer': 'bg-purple-600 hover:bg-purple-700',
            'reOffer75Less': 'bg-violet-600 hover:bg-violet-700',
            'markCompleted': 'bg-emerald-600 hover:bg-emerald-700'
          };
          const confirmed = await showConfirmation({
            title: 'Confirm Action',
            message: confirmMessages[actionType] || 'Are you sure you want to proceed?',
            confirmText: actionType === 'deleteOrder' ? 'Delete' : actionType === 'cancelOrder' ? 'Cancel Order' : 'Confirm',
            cancelText: 'Go Back',
            confirmClass: confirmClasses[actionType] || 'bg-indigo-600 hover:bg-indigo-700'
          });
          if (!confirmed) return;
        }
        
        // tracking guard
        const order = state.allOrders.find(o => o.id === orderId);
        if ((actionType === "refreshKitTracking" || actionType === "refreshEmailTracking" || actionType === "updateTracking") && order && isStatusPastReceived(order.status)) {
          toast("Skipping tracking refresh: order is past received", "info");
          return;
        }
        const resolveAdminLabelEndpoint = (targetOrder = {}) => {
          const shippingInfo = targetOrder?.shippingInfo || {};
          const candidates = [
            targetOrder.labelDeliveryMethod,
            targetOrder.labelCarrier,
            targetOrder.shippingLabelCarrier,
            targetOrder.selectedShippingLabelCarrier,
            targetOrder.selectedLabelCarrier,
            targetOrder.labelProvider,
            targetOrder.shippingLabelProvider,
            targetOrder.shippingMethod,
            targetOrder.selectedShippingMethod,
            targetOrder.selectedShippingOption,
            targetOrder.preferredLabelCarrier,
            targetOrder.preferredShippingCarrier,
            targetOrder.requestedLabelCarrier,
            targetOrder.shippingCarrier,
            targetOrder.shipCarrier,
            targetOrder.labelType,
            targetOrder.selectedLabelType,
            targetOrder.requestedLabelType,
            targetOrder.labelServiceCode,
            targetOrder.selectedLabelServiceCode,
            shippingInfo.labelDeliveryMethod,
            shippingInfo.labelCarrier,
            shippingInfo.shippingLabelCarrier,
            shippingInfo.selectedLabelCarrier,
            shippingInfo.selectedShippingLabelCarrier,
            shippingInfo.shippingMethod,
            shippingInfo.selectedShippingMethod,
            shippingInfo.selectedShippingOption,
            shippingInfo.requestedLabelCarrier,
            shippingInfo.labelServiceCode,
            targetOrder.upsLabelUrl ? 'ups' : '',
            targetOrder.uspsLabelUrl ? 'usps' : '',
            String(targetOrder.trackingNumber || '').trim().toUpperCase().startsWith('1Z') ? 'ups' : '',
          ];

          for (const candidate of candidates) {
            const normalized = String(candidate || '').trim().toLowerCase();
            if (!normalized) continue;
            if (normalized === 'ups' || normalized.includes('ups') || normalized.includes('ups_ground') || normalized.includes('ground')) {
              return '/api/shipping/generate-ups-label';
            }
            if (
              normalized === 'usps' ||
              normalized.includes('usps') ||
              normalized.includes('stamps_com') ||
              normalized.includes('postal') ||
              normalized.includes('first_class') ||
              normalized.includes('priority_mail')
            ) {
              return '/api/shipping/generate-usps-label';
            }
          }

          return '/api/shipping/generate-usps-label';
        };
        let endpoint = "";
        let method = "POST";
        let body = options?.body ?? null;
        let returnLabelDeclinedKeys = [];
        switch (actionType) {
          case "generateLabel": {
            await apiPost(resolveAdminLabelEndpoint(order || {}), { orderId });
            const refreshedOrder = upsertOrderInState(await fetchOrderPrintData(orderId));
            const labelUrls = getSavedLabelUrls(refreshedOrder);
            filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
            if (labelUrls.length) {
              labelUrls.forEach((labelUrl) => window.open(labelUrl, "_blank", "noopener,noreferrer"));
              toast(`Opened ${labelUrls.length} label${labelUrls.length === 1 ? "" : "s"} in new tab${labelUrls.length === 1 ? "" : "s"}`, "success");
            } else {
              toast("Label generated, but no saved label URLs were returned yet", "info");
            }
            return;
          }
          case "markReceived":
            endpoint = `/orders/${orderId}/status`;
            method = "PUT";
            body = { status: "received", ...(options?.body || {}) };
            break;
          case "markCompleted":
            endpoint = `/orders/${orderId}/status`;
            method = "PUT";
            body = { status: "completed", ...(options?.body || {}) };
            break;
          case "sendReturnLabel":
            if (order) {
              const settlement = getOrderSettlementSummary(order);
              if (!settlement.declinedCount) {
                toast("No re-offer declined devices found for return label.", "error");
                return;
              }
              returnLabelDeclinedKeys = settlement.declinedDeviceKeys || [];
              const mailClass = settlement.declinedCount >= 5 ? "priority" : "first_class";
              endpoint = `/orders/${orderId}/return-label`;
              method = "POST";
              body = {
                mailClass,
                declinedDeviceCount: settlement.declinedCount,
                declinedDeviceKeys: settlement.declinedDeviceKeys,
              };
              break;
            }
            endpoint = `/orders/${orderId}/return-label`;
            method = "POST";
            body = {};
            break;
          case "markKitSent":
            endpoint = `/orders/${orderId}/mark-kit-sent`;
            method = "POST";
            body = {};
            break;
          case "sendReviewRequest":
            endpoint = `/orders/${orderId}/send-review-request`;
            method = "POST";
            body = {};
            break;
          case "autoRequote":
            endpoint = `/orders/${orderId}/auto-requote`;
            method = "POST";
            body = { ...(options?.body || {}) };
            break;
          case "refreshKitTracking":
            endpoint = `/refresh-tracking`;
            method = "POST";
            body = { orderId, type: "kit" };
            break;
          case "refreshEmailTracking":
            endpoint = `/refresh-tracking`;
            method = "POST";
            body = { orderId, type: "email" };
            break;
          case "updateTracking":
            endpoint = `/refresh-tracking`;
            method = "POST";
            body = { orderId, type: matchesKitTrackingHints(order) ? "kit" : "email" };
            break;
          case "cancelOrder":
            // uses /orders/{id}/cancel, caller can pass { body:{voidLabels:true} } etc
            endpoint = `/orders/${orderId}/cancel`;
            method = "POST";
            body = options?.body ?? {};
            break;
          case "deleteOrder":
            endpoint = `/orders/${orderId}`;
            method = "DELETE";
            body = null;
            break;
          // condition email (exact)
          case "sendConditionEmail":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = options?.body ?? {}; // { reason, notes?, label? }
            break;
          // re-offer (exact)
          case "reOffer":
            endpoint = `/orders/${orderId}/re-offer`;
            method = "POST";
            body = options?.body ?? {}; // { newPrice, reasons, comments }
            break;
          case "reOffer75Less": {
            const targetDeviceKey =
              options?.body?.deviceKey ||
              state.qcDeviceKey ||
              state.selectedDeviceKey ||
              getActiveDeviceKey(order) ||
              buildOrderDeviceKey(orderId, 0);
            const draft = buildSeventyFiveLessReofferDraft(
              order,
              targetDeviceKey,
              getDeviceStatus(order, targetDeviceKey) || order?.status || ''
            );
            if (!draft) {
              toast("Could not calculate the 75%-less re-offer amount for this device.", "error");
              return;
            }
            endpoint = `/orders/${orderId}/re-offer`;
            method = "POST";
            body = {
              ...draft,
              ...(options?.body || {}),
              deviceKey: targetDeviceKey,
            };
            break;
          }
          // New Actions from JSON Spec
          case "emailBalance":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = { reason: "outstanding_balance", label: "Email Outstanding Balance Notice", ...(options?.body || {}) };
            break;
          case "emailLocked":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = { reason: "password_locked", label: "Email Password Lock Notice", ...(options?.body || {}) };
            break;
          case "emailStolen":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = { reason: "stolen", label: "Email Blacklisted Notice", ...(options?.body || {}) };
            break;
          case "emailBlacklisted":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = { reason: "stolen", label: "Email Blacklisted Notice", ...(options?.body || {}) };
            break;
          case "emailFmi":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = { reason: "fmi_active", label: "Email FMI / Activation Lock Notice", ...(options?.body || {}) };
            break;
          case "markPaid":
            // Re-offered accepted payment flow
            endpoint = `/orders/${orderId}/status`;
            method = "PUT";
            body = { status: "completed" };
            break;
          case "payNow":
            toast("Use the Pay Now confirmation flow to complete payment.", "error");
            return;
          case "printDocs":
            await printBundle(orderId, {
              includeAllPackingSlips: options?.includeAllPackingSlips !== false,
              deviceIndex: Number.isInteger(options?.deviceIndex) ? options.deviceIndex : null
            });
            return;
          case "printPacking":
            await printPackingSlip(orderId);
            return;
          case "viewReturnLabel": {
            const returnLabelUrl = getReturnLabelUrl(order);
            if (!returnLabelUrl) {
              toast("No saved return label URL found for this order.", "error");
              return;
            }
            window.open(returnLabelUrl, "_blank", "noopener,noreferrer");
            toast("Return label opened in a new tab.", "success");
            return;
          }
          case "voidLabels":
              // Just a UI trigger to switch tab, no API call here directly unless submitted
              // But if we want to trigger the void modal logic:
              // The caller usually handles UI. If here, maybe trigger generic void?
              // I'll leave this as a UI-only handler in the event listener, but if it reaches here:
              return; 
          case "clearData":
              // Placeholder for "Clear Saved Shipping Data"
              toast("Clear data not implemented", "info");
              return;
          default:
            toast(`Unknown action: ${actionType}`, "error");
            return;
        }
        let actionResult = null;

        if (method === "GET") actionResult = await apiGet(endpoint);
        else if (method === "POST") actionResult = await apiPost(endpoint, body ?? {});
        else if (method === "PUT") await apiPut(endpoint, body ?? {});
        else if (method === "DELETE") await apiDelete(endpoint);

        if (actionType === "deleteOrder") {
          removeOrderFromState(orderId);
          filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
          render();
          return { ok: true, deleted: true };
        }

        try {
          const latestOrder = await fetchOrderPrintData(orderId);
          upsertOrderInState(latestOrder);
        } catch (refreshError) {
          console.warn(`Failed to refresh admin order state for ${orderId}:`, refreshError);
        }

        await hydrateSelectedOrderDetails(orderId);
        // refresh order data by re-running filter (Firestore will also push updates)
        filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });

        if (actionType === 'sendReturnLabel') {
          await markReturnLabelGeneratedAfterLabelCreate(orderId, returnLabelDeclinedKeys);
          try {
            const latestOrder = await fetchOrderPrintData(orderId);
            upsertOrderInState(latestOrder);
          } catch (refreshError) {
            console.warn(`Failed to refresh admin order state after return label for ${orderId}:`, refreshError);
          }
          filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
        }

        await hydrateSelectedOrderDetails(orderId);
        // refresh order data by re-running filter (Firestore will also push updates)
        filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });

        if (actionType === 'sendReturnLabel') {
          const returnLabelUrl = actionResult?.returnLabelUrl || actionResult?.labelUrl || null;
          const refreshedOrder = state.allOrders.find((entry) => entry.id === orderId);
          const refreshedStatus = normalizeStatusKey(refreshedOrder?.status);
          const isReturnLabelGenerated = refreshedStatus === 'return-label-generated';
          if (!isReturnLabelGenerated) {
            toast('Return label was not opened because status is not Return Label Generated yet.', 'error');
            return { ok: false, error: new Error('Status is not return-label-generated') };
          }
          if (!returnLabelUrl) {
            toast('Return label generated, but no label URL was returned.', 'info');
            return { ok: true, data: actionResult };
          }
          window.open(returnLabelUrl, '_blank', 'noopener,noreferrer');
          toast('Return label opened in a new tab.', 'success');
          return { ok: true, data: actionResult };
        }

        toast(`Action ${actionType} success`, "success");
        // refresh order data by re-running filter (Firestore will also push updates)
        return { ok: true, data: actionResult };
      } catch (e) {
        console.error(e);
        toast(`Action failed: ${e.message}`, "error");
        return { ok: false, error: e };
      }
    }
    async function saveQc(orderId, deviceKey, qcData) {
      try {
        const orderRef = doc(db, "orders", orderId);
        const safeDeviceKey = deviceKey || buildOrderDeviceKey(orderId, 0);
        
        // First, get the current order to compute new order status
        const orderSnap = await withPerf(`firestore:getOrder:${orderId}`, () => getDoc(orderRef));
        const order = orderSnap.exists() ? { id: orderSnap.id, ...orderSnap.data() } : null;
        
        if (!order) {
          toast("Order not found", "error");
          return;
        }

        if (isCancelledStatusValue(order.status) || isCancelledStatusValue(getDeviceStatus(order, safeDeviceKey))) {
          toast("QC is disabled for canceled orders/devices", "error");
          return;
        }
        
        // Good QC moves the device into a payable state.
        const deviceStatus = "ready_to_pay";
        
        // Temporarily update order in memory to compute new status
        const tempOrder = {
          ...order,
          qcDataByDevice: {
            ...order.qcDataByDevice,
            [safeDeviceKey]: qcData
          },
          deviceStatusByKey: {
            ...order.deviceStatusByKey,
            [safeDeviceKey]: deviceStatus
          }
        };
        
        // Compute new order status based on all devices
        const newOrderStatus = computeOrderStatus(tempOrder);
        
        try {
          await withPerf(`firestore:updateOrder:${orderId}`, () => updateDoc(orderRef, {
            [`qcDataByDevice.${safeDeviceKey}`]: qcData,
            [`deviceStatusByKey.${safeDeviceKey}`]: deviceStatus,
            ...(safeDeviceKey.endsWith("::0") ? { qcData } : {}),
            status: newOrderStatus,
            qcCompletedAt: new Date()
          }));
        } catch (e) {
          await withPerf(`firestore:setOrder:${orderId}`, () => setDoc(orderRef, {
            qcDataByDevice: { [safeDeviceKey]: qcData },
            deviceStatusByKey: { [safeDeviceKey]: deviceStatus },
            ...(safeDeviceKey.endsWith("::0") ? { qcData } : {}),
            status: newOrderStatus,
            qcCompletedAt: new Date()
          }, { merge: true }));
        }
        toast("QC saved", "success");
      } catch (e) {
        console.error(e);
        toast("Failed to save QC", "error");
      }
    }

    async function processQcOutcome(order, qcData, deviceKey) {
      const emailActions = [];
      if (qcData?.hasFmi === "yes") emailActions.push("emailFmi");
      if (qcData?.isLocked === "yes") emailActions.push("emailLocked");
      if (qcData?.hasBalance === "yes") emailActions.push("emailBalance");
      if (qcData?.hasBlacklisted === "yes") emailActions.push("emailBlacklisted");

      for (const action of emailActions) {
        try {
          await handleAction(order.id, action, { body: { deviceKey } });
        } catch (err) {
          console.error("QC auto-email failed", action, err);
        }
      }

      // Email endpoints now handle device-level status updates
      // No need to manually update status here

      return { sentEmails: emailActions.length > 0 };
    }

    // ----------------------------
    // SPEC: STATUS COUNTS + METRICS
    // ----------------------------
    function computeStatusCounts() {
      const { visible, cancelled } = splitCancelled(state.allOrders);
      const statusCounts = new Map();
      const visibleGroups = groupDevicesForTable(flattenOrdersToDevices(visible));
      for (const group of visibleGroups) {
        const status = normalizeStatusKey(group?.deviceStatus) || "unknown";
        statusCounts.set(status, (statusCounts.get(status) || 0) + 1);
      }

      const cancelledSource = [...cancelled, ...visible.filter((order) => orderHasDeviceWithStatus(order, "cancelled"))];
      const seenCancelled = new Set();
      const dedupedCancelledSource = cancelledSource.filter((order) => {
        if (!order?.id || seenCancelled.has(order.id)) return false;
        seenCancelled.add(order.id);
        return true;
      });
      const cancelledGroups = groupDevicesForTable(flattenOrdersToDevices(dedupedCancelledSource))
        .filter((group) => normalizeStatusKey(group?.deviceStatus) === "cancelled");

      const miscCount = visibleGroups.filter((group) => isMiscStatusValue(group?.deviceStatus)).length;
      statusCounts.set("misc", miscCount);
      const statusCountAll = visibleGroups.length + cancelledGroups.length;
      const cancelledCount = cancelledGroups.length;
      // live orders = all device groups excluding completed + return-label-generated + cancelled
      const allGroups = groupDevicesForTable(flattenOrdersToDevices(state.allOrders || []));
      const liveOrders = allGroups.filter((group) => {
        const s = normalizeStatusKey(group?.deviceStatus);
        return s !== "completed" && s !== "return-label-generated" && s !== "cancelled";
      }).length;
      const turnaroundBaseGroups = allGroups.filter((group) => normalizeStatusKey(group?.deviceStatus) !== "kits");
      const sentToUsCount = turnaroundBaseGroups.filter((group) => isSentToUsStatusValue(group?.deviceStatus)).length;
      const turnaroundRate = turnaroundBaseGroups.length
        ? Math.round((sentToUsCount / turnaroundBaseGroups.length) * 100)
        : 0;
      return {
        statusCounts,
        statusCountAll,
        cancelledCount,
        liveOrders,
        visible,
        turnaroundStats: {
          sentToUsCount,
          baseCount: turnaroundBaseGroups.length,
          rate: turnaroundRate,
        },
      };
    }
    function updateGlassMetricsHTML() {
      const { statusCounts, turnaroundStats } = computeStatusCounts();
      const actionCards = [
        {
          key: "turnaround_rate",
          label: "Turnaround Rate",
          helper: `${turnaroundStats.sentToUsCount} of ${turnaroundStats.baseCount} actually sent to us`,
          count: `${turnaroundStats.rate}%`,
          tone: "border-slate-200 bg-white text-slate-900",
          countTone: "bg-slate-100 text-slate-700",
          nonFilter: true,
        },

      if (!quoteDate || !labelDate) return "";

      const nowMs = Date.now();
      const dayMs = 1000 * 60 * 60 * 24;
      const daysSinceQuote = Math.floor((nowMs - quoteDate.getTime()) / dayMs);
      // Rule 1: while still in label generated, show after quote is 15+ days old.
      const currentlyOverdueInLabelGen = status === "label_generated" && daysSinceQuote >= 15;

      // Rule 2: once it became overdue in label generated, keep showing the badge on later statuses.

      const leftLabelGeneratedAt = toDateAny(
        order?.lastStatusUpdateAt ||
        order?.statusUpdatedAt ||
        order?.updatedAt ||
        order?.updated_at ||
        order?.lastUpdatedAt
      );
      const daysInLabelGeneratedBeforeStatusChange = leftLabelGeneratedAt
        ? Math.floor((leftLabelGeneratedAt.getTime() - labelDate.getTime()) / dayMs)
        : null;
      const wasOverdueBeforeStatusChanged =
        status !== "label_generated" &&
        Number.isFinite(daysInLabelGeneratedBeforeStatusChange) &&
        daysInLabelGeneratedBeforeStatusChange >= 14;

      if (!currentlyOverdueInLabelGen && !wasOverdueBeforeStatusChanged) return "";

      return `

    function workflowStepperHTML(order, statusOverride = null) {
      const status = statusOverride || order.status || "order_pending";
      const hasLabel = !!getAnyTrackingNumber(order) || String(order.status || "").includes("label");
      const hasQc = !!(order.qcData || (order.qcDataByDevice && Object.keys(order.qcDataByDevice).length));
      let activeStep = 0;
      const s = normalizeStatusKey(status);
      if (s.includes("completed") || s.includes("paid")) activeStep = 4;
      else if (s.includes("ready_to_pay") || s.includes("emailed") || s.includes("issue_resolved") || s.includes("re-offer")) activeStep = 3;
      else if (hasQc || s.includes("received")) activeStep = 2;
      else if (hasLabel || s.includes("label") || s.includes("transit") || s.includes("delivered_to_us")) activeStep = 1;
      else if (s.includes("pending") || s.includes("printing")) activeStep = 0;
      else if (s.includes("cancel")) activeStep = -1;
      if (activeStep === -1) {
        const cancellationText = isAutoCancelledAfter28Days(order)
          ? "This order was cancelled automatically after 28 days with no device sent in."
          : "This order has been cancelled.";
        return `
          <div class="px-6 py-3 bg-rose-50 border-b border-rose-100 flex items-center justify-center gap-2 text-rose-700 font-medium text-sm">
            <i data-lucide="ban" style="width:16px;height:16px"></i> ${esc(cancellationText)}
          </div>
        `;
      }
      const steps = [
        { label: "Pending", icon: "clock" },
        { label: "Label / Transit", icon: "truck" },
        { label: "Received / QC", icon: "shield-check" },
        { label: "Ready / Re-Offer", icon: "alert-triangle" },
        { label: "Paid & Done", icon: "check-circle" },
      ];
      const pct = Math.max(0, Math.min(100, (activeStep / (steps.length - 1)) * 100));
      return `
        <div class="px-6 py-4 bg-slate-50/50 border-b border-slate-200">
          <div class="relative flex items-center justify-between w-full max-w-lg mx-auto">
            <div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-0.5 bg-slate-200 -z-10"></div>
            <div class="absolute left-0 top-1/2 -translate-y-1/2 h-0.5 bg-indigo-600 -z-10 transition-all duration-500" style="width:${pct}%"></div>
            ${steps.map((st, idx) => {
              const isActive = idx <= activeStep;
              const isCurrent = idx === activeStep;
              return `
                <div class="relative z-10 flex flex-col items-center gap-2">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center border-2 transition-all duration-300 ${
                    isActive ? "bg-indigo-600 border-indigo-600 text-white" : "bg-white border-slate-300 text-slate-400"
                  }">
                    <i data-lucide="${st.icon}" style="width:14px;height:14px"></i>
                  </div>
                  <span class="text-[10px] uppercase font-bold tracking-wider absolute -bottom-6 whitespace-nowrap ${
                    isCurrent ? "text-indigo-700" : "text-slate-400"
                  }">${esc(st.label)}</span>
                </div>
              `;
            }).join("")}
          </div>
          <div class="h-4"></div>
        </div>
      `;
    }

    function renderDrawerFooter(order) {

      const settlement = getOrderSettlementSummary(order, scopedDeviceKeys);
        const groups = {

      const issueEntries = Array.isArray(info.issueEntries) ? info.issueEntries : [];
      const hasPasswordIssue = issueEntries.some((entry) => String(entry?.reason || "").toLowerCase() === "password_locked");
      const method = String(unlock?.method || '').trim().toLowerCase();
      const hasUnlockData = !!(unlock && method && (unlock.value || (Array.isArray(unlock.patternPath) && unlock.patternPath.length)));
      const patternPath = Array.isArray(unlock?.patternPath) ? unlock.patternPath : [];

    function scheduleRender() {

      scheduledRenderFrame = requestAnimationFrame(() => {
        scheduledRenderFrame = 0;
        doRender();
      });
    }
    function render() {
      if (scheduledRenderFrame) {
        cancelAnimationFrame(scheduledRenderFrame);
        scheduledRenderFrame = 0;
      }
      doRender();

    // ----------------------------
    // EVENTS
    // ----------------------------
    function bindAppEvents() {
      const ABANDONED_SEQUENCE_TRIGGER = "hf12";
      let abandonedSequenceTypedBuffer = "";
      function openAbandonedSequenceModal() {
        const modal = document.getElementById("abandoned-sequence-modal");
        if (!modal) return;
        modal.classList.remove("hidden");
        modal.classList.add("flex");
        const emailInput = document.getElementById("abandoned-sequence-email");
        if (emailInput) {
          requestAnimationFrame(() => emailInput.focus());
        }
      }
      function closeAbandonedSequenceModal() {
        const modal = document.getElementById("abandoned-sequence-modal");
        if (!modal) return;
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }
      function setAbandonedSequenceStatus(message, type = "info") {
        const statusEl = document.getElementById("abandoned-sequence-status");
        if (!statusEl) return;
        statusEl.textContent = String(message || "");
        statusEl.className = "text-sm rounded-md px-3 py-2";
        if (type === "success") {
          statusEl.classList.add("bg-green-100", "text-green-700");
        } else if (type === "error") {
          statusEl.classList.add("bg-rose-100", "text-rose-700");
        } else {
          statusEl.classList.add("bg-slate-100", "text-slate-700");
        }
        statusEl.classList.remove("hidden");
      }
      function setAbandonedSequenceSending(isSending) {
        const submitBtn = document.getElementById("submit-abandoned-sequence-btn");
        if (!submitBtn) return;
        submitBtn.disabled = !!isSending;
        submitBtn.textContent = isSending ? "Sending..." : "Send All 5";
      }
      async function handleSendAbandonedTestSequence() {
        const emailInput = document.getElementById("abandoned-sequence-email");
        const targetEmail = String(emailInput?.value || "").trim().toLowerCase();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(targetEmail)) {
          setAbandonedSequenceStatus("Please enter a valid email address.", "error");
          return;
        }

        const stages = [
          { key: "30m", subject: "Did you forget something?" },
          { key: "4h", subject: "Your quote is waiting" },
          { key: "24h", subject: "Limited-time bonus reminder" },
          { key: "72h", subject: "Final reminder before your quote expires" },
          { key: "7d", subject: "Last chance to complete checkout" },
        ];

        setAbandonedSequenceSending(true);
        setAbandonedSequenceStatus("Sending 5 emails. Please wait…", "info");

        try {
          for (let index = 0; index < stages.length; index += 1) {
            const stage = stages[index];
            const html = `
              <div style="font-family:Arial,sans-serif;line-height:1.6;color:#0f172a;max-width:640px;margin:0 auto;padding:24px;">
                <h2 style="margin:0 0 12px;font-size:24px;color:#0f172a;">SecondHandCell Test Email (${stage.key})</h2>
                <p style="margin:0 0 10px;">This is abandoned checkout sequence test email <strong>${index + 1}/5</strong>.</p>
                <p style="margin:0 0 10px;">Recipient: <strong>${targetEmail}</strong></p>
                <p style="margin:0;">Stage key: <strong>${stage.key}</strong></p>
              </div>
            `;

            await apiPost("/send-email", {
              to: targetEmail,
              subject: `[TEST ${index + 1}/5] ${stage.subject}`,
              html,
            }, { authRequired: true });
          }

          setAbandonedSequenceStatus(`Done! Sent all 5 test emails to ${targetEmail}.`, "success");
          toast(`Sent 5 abandoned-checkout test emails to ${targetEmail}.`, "success");
        } catch (error) {
          const message = error?.message || "Failed to send abandoned checkout sequence.";
          setAbandonedSequenceStatus(message, "error");
          toast(message, "error");
        } finally {
          setAbandonedSequenceSending(false);
        }
      }
      function maybeOpenAbandonedSequenceModal(value) {
        const text = String(value || "").toLowerCase();
        if (text.includes(ABANDONED_SEQUENCE_TRIGGER)) {
          openAbandonedSequenceModal();
        }
      }

      if (!state.abandonedSequenceGlobalKeyBound) {
        document.addEventListener("keydown", (event) => {
          const pressedKey = typeof event?.key === "string" ? event.key : "";
          if (!pressedKey) return;
          if (event.metaKey || event.ctrlKey || event.altKey) return;
          if (pressedKey === "Escape") {
            abandonedSequenceTypedBuffer = "";
            return;
          }
          if (pressedKey === "Backspace") {
            abandonedSequenceTypedBuffer = abandonedSequenceTypedBuffer.slice(0, -1);
            return;
          }
          if (pressedKey.length !== 1) return;

          abandonedSequenceTypedBuffer = (abandonedSequenceTypedBuffer + pressedKey.toLowerCase()).slice(-48);
          if (abandonedSequenceTypedBuffer.includes(ABANDONED_SEQUENCE_TRIGGER)) {
            abandonedSequenceTypedBuffer = "";
            openAbandonedSequenceModal();
          }
        });
        state.abandonedSequenceGlobalKeyBound = true;
      }

      if (!state.viewDelegationBound) {

            state.qcDeviceKey = deviceKey;
            state.drawerTab = "qc";
            state.statusDropdownOpen = false;
            state.qcOpen = false;
            state.qcStep = 1;
            state.qcData = null;
            state.reofferOpen = false;
            state.reofferData = null;
            state.reofferValidation = { message: "", fields: {} };
            state.unlockInfoModalOpen = false;

            render();
            hydrateSelectedOrderDetails(parsed.orderId);
          }
        });
        state.viewDelegationBound = true;

      // Logout

      // Search inputs

      const clearSearchBtn = document.getElementById("clearSearchBtn");

              if (action === "markReceived") {

                if (refreshedOrderSnap.exists()) {
                  const latest = { id: refreshedOrderSnap.id, ...refreshedOrderSnap.data() };
                  const aggregatedStatus = computeOrderStatus(latest);
                  if (aggregatedStatus === "received") {
                    await updateOrderStatusInline(order.id, "received");
                    try {

                      upsertOrderInState(latestOrder);
                    } catch (refreshError) {

                    await hydrateSelectedOrderDetails(order.id);
                    filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });

              return;
            }
            let actionOptions = {};
            try { actionOptions = JSON.parse(btn.getAttribute("data-action-options") || "{}"); } catch (_) { actionOptions = {}; }
            await handleAction(order.id, action, actionOptions);
          });

        // void labels submit

            await hydrateSelectedOrderDetails(order.id);
