          // Normalize and compare customer input with QC assessment
          const normalizeStr = (s) => String(s || '').toLowerCase().trim();
          
          const customerCondition = normalizeStr(customerItem.condition || order.condition || 'good');
          const qcCondition = normalizeStr(qcSnapshot.condition || 'good');
          
          const customerCarrier = normalizeStr(customerItem.carrier || customerItem.lock || order.carrier || order.lock || 'unlocked');
          const qcCarrier = normalizeStr(qcSnapshot.carrier || 'unlocked');
          
          const customerStorage = normalizeStr(customerItem.storage || order.storage || '');
          const qcStorage = normalizeStr(qcSnapshot.actualStorage || qcSnapshot.storage || '');
          
          // Check if QC matches customer's declared values
          const conditionMatches = customerCondition === qcCondition;
          const carrierMatches = customerCarrier === qcCarrier;
          const storageMatches = !customerStorage || !qcStorage || customerStorage === qcStorage || qcSnapshot.storageMatch === 'yes';
          
          const allInputsMatch = conditionMatches && carrierMatches && storageMatches;
          const hasBlockingIssues = qcOutcome.sentEmails; // FMI, locks, balance, blacklist
          
          if (allInputsMatch && !hasBlockingIssues) {
            // Admin's QC matches customer input - skip reoffer, proceed to payment
            toast("QC completed! Admin assessment matches customer input.", "success");
            render();
          } else if (hasBlockingIssues) {
            // Blocking issues detected - emails sent, waiting for customer
            toast("QC saved. Required customer emails sent. Waiting for response.", "info");
            render();
          } else {
            // QC doesn't match customer input - show reoffer modal
            await openReofferModal(order, qcSnapshot);
            render();
          }
        });
        syncStepInputs();
      }
      if (state.reofferOpen && order) {
        const closeReoffer = () => {
          state.reofferOpen = false;
          state.reofferData = null;
          state.reofferValidation = { message: "", fields: {} };
          state.modalScrollTop.reoffer = 0;
          render();
        };
        document.getElementById("reofferCloseBtn")?.addEventListener("click", closeReoffer);
        document.getElementById("reofferCancelBtn")?.addEventListener("click", closeReoffer);
        const clearValidationField = (field) => {
          if (!state.reofferValidation?.fields?.[field] && !state.reofferValidation?.message) return;
          state.reofferValidation = {
            message: "",
            fields: { ...(state.reofferValidation?.fields || {}) }
          };
          delete state.reofferValidation.fields[field];
          render();
        };
        document.getElementById("reofferPrice")?.addEventListener("input", (event) => {
          if (state.reofferData) state.reofferData.newPrice = event?.target?.value ?? state.reofferData.newPrice;
          clearValidationField("price");
        });
        document.getElementById("reofferReasons")?.addEventListener("input", (event) => {
          if (state.reofferData) state.reofferData.reasons = event?.target?.value ?? "";
          clearValidationField("reasons");
        });
        document.getElementById("reofferComments")?.addEventListener("input", (event) => {
          if (state.reofferData) state.reofferData.comments = event?.target?.value ?? "";
          clearValidationField("comments");
        });
        document.getElementById("reofferCarrier")?.addEventListener("input", (event) => {
          if (state.reofferData) state.reofferData.carrier = event?.target?.value ?? "";
        });
        document.getElementById("reofferCondition")?.addEventListener("input", (event) => {
          if (state.reofferData) state.reofferData.condition = event?.target?.value ?? "";
        });
        document.getElementById("reofferBrand")?.addEventListener("input", (event) => {
          if (state.reofferData) state.reofferData.brand = event?.target?.value ?? "";
        });
        document.getElementById("reofferModel")?.addEventListener("input", (event) => {
          if (state.reofferData) state.reofferData.modelId = event?.target?.value ?? "";
        });
        document.getElementById("reofferStorage")?.addEventListener("input", (event) => {
          if (state.reofferData) state.reofferData.storage = event?.target?.value ?? "";
        });
        document.getElementById("reofferDeviceKey")?.addEventListener("change", (event) => {
          const targetKey = event?.target?.value || '';
          if (!state.reofferData || !targetKey) return;
          const picked = (state.reofferData.availableDevices || []).find((entry) => entry.key === targetKey);
          state.reofferData.deviceKey = targetKey;
          if (picked?.item) {
            state.reofferData.carrier = picked.item.carrier || picked.item.lock || state.reofferData.carrier || '';
            state.reofferData.condition = picked.item.condition || state.reofferData.condition || 'good';
            state.reofferData.brand = picked.item.brand || state.reofferData.brand || '';
            state.reofferData.modelId = picked.item.modelId || picked.item.model || state.reofferData.modelId || '';
            state.reofferData.storage = picked.item.storage || state.reofferData.storage || '';
          }
          render();
        });
        document.getElementById("reofferSubmitBtn")?.addEventListener("click", async () => {
          const price = Number(document.getElementById("reofferPrice")?.value || 0);
          const reasons = (document.getElementById("reofferReasons")?.value || "").trim();
          const comments = (document.getElementById("reofferComments")?.value || "").trim();
          const carrier = (document.getElementById("reofferCarrier")?.value || "").trim();
          const condition = (document.getElementById("reofferCondition")?.value || "").trim();
          const brand = (document.getElementById("reofferBrand")?.value || "").trim();
          const modelId = (document.getElementById("reofferModel")?.value || "").trim();
          const storage = (document.getElementById("reofferStorage")?.value || "").trim();
          const deviceKey = (document.getElementById("reofferDeviceKey")?.value || "").trim() || state.reofferData?.deviceKey || state.qcDeviceKey || state.selectedDeviceKey || null;
          if (state.reofferData) {
            state.reofferData.newPrice = Number.isFinite(price) && price > 0 ? price.toFixed(2) : (document.getElementById("reofferPrice")?.value || "");
            state.reofferData.reasons = reasons;
            state.reofferData.comments = comments;
            state.reofferData.carrier = carrier;
            state.reofferData.condition = condition;
            state.reofferData.brand = brand;
            state.reofferData.modelId = modelId;
            state.reofferData.storage = storage;
            state.reofferData.deviceKey = deviceKey || state.reofferData.deviceKey;
          }
          const validation = validateReofferDraft({ price, reasons, comments });
          if (validation.hasErrors) {
            state.reofferValidation = validation;
            toast("Please fix the highlighted re-offer fields before sending.", "error");
            render();
            return;
          }
          const originalPrice = Number(getOriginalReofferCap(order, deviceKey));
          if (Number.isFinite(originalPrice) && price > (originalPrice + 0.009)) {
            state.reofferPriceGuardData = { enteredPrice: price, originalPrice };
            state.reofferPriceGuardOpen = true;
            render();
            return;
          }
          const result = await handleAction(order.id, "reOffer", {
            body: {
              newPrice: price,
              reasons: reasons ? reasons.split(/\n+/).map(x => x.trim()).filter(Boolean) : [],
              comments,
              carrier,
              condition,
              brand,
              modelId,
              storage,
              deviceKey
            }
          });
          if (!result?.ok) {
            state.reofferValidation = {
              message: result?.error?.message || "We could not send this re-offer. Please try again.",
              fields: { ...(state.reofferValidation?.fields || {}) }
            };
            render();
            return;
          }
          state.reofferOpen = false;
          state.reofferData = null;
          state.reofferValidation = { message: "", fields: {} };
          state.modalScrollTop.reoffer = 0;
          render();
        });
      }
      if (state.reofferPriceGuardOpen) {
        document.getElementById("reofferPriceGuardCloseBtn")?.addEventListener("click", () => {
          state.reofferPriceGuardOpen = false;
          state.reofferPriceGuardData = null;
          render();
        });
      }
      // Order text import modal controls
      if (state.orderTextImportOpen) {
        const close = document.getElementById("orderTextImportCloseBtn");
        const cancel = document.getElementById("orderTextImportCancelBtn");
        const submit = document.getElementById("orderTextImportSubmitBtn");
        const closeAll = () => { state.orderTextImportOpen = false; state.modalScrollTop.import = 0; render(); };
        if (close) close.addEventListener("click", closeAll);
        if (cancel) cancel.addEventListener("click", closeAll);
        if (submit) submit.addEventListener("click", () => {
          // placeholder: wire your real handleOrderTextImportSubmit here
          toast("Order text import not yet fully wired", "info");
          closeAll();
        });
      }
      // Confirmation modal controls
      if (state.confirmModalOpen) {
        const confirmBtn = document.getElementById("confirmModalConfirmBtn");
        const cancelBtn = document.getElementById("confirmModalCancelBtn");
        const closeModal = (result) => {
          if (state.confirmModalData?.onConfirm) {
            state.confirmModalData.onConfirm(result);
          }
          state.confirmModalOpen = false;
          state.confirmModalData = null;
          render();
        };
        if (confirmBtn) confirmBtn.addEventListener("click", () => closeModal(true));
        if (cancelBtn) cancelBtn.addEventListener("click", () => closeModal(false));
      }

      if (state.trackingReportModalOpen) {
        const closeBtn = document.getElementById("trackingReportCloseBtn");
        const doneBtn = document.getElementById("trackingReportDoneBtn");
        const overlay = document.getElementById("trackingReportOverlay");
        const closeReport = () => {
          state.trackingReportModalOpen = false;
          state.trackingReportData = null;
          render();
        };
        if (closeBtn) closeBtn.addEventListener("click", closeReport);
        if (doneBtn) doneBtn.addEventListener("click", closeReport);
        if (overlay) {
          overlay.addEventListener("click", (event) => {
            if (event.target === overlay) closeReport();
          });
        }
      }
      
      // Payment Confirmation Modal Listeners
      if (state.paymentConfirmModalOpen) {
        const paymentCancelBtn = document.getElementById("paymentConfirmCancelBtn");
        const paymentYesBtn = document.getElementById("paymentConfirmYesBtn");
        const paymentInfo = document.getElementById("paymentInfoSection");
        const payoutAmountEl = document.getElementById("payoutAmount");
        const deepLinkBtn = document.getElementById("paymentDeepLinkBtn");
        const deepLinkHint = document.getElementById("paymentDeepLinkHint");
        
        if (paymentCancelBtn) {
          paymentCancelBtn.addEventListener("click", () => {
            state.paymentConfirmModalOpen = false;
            state.paymentConfirmPayload = null;
            render();
          });
        }

        if (paymentInfo && payoutAmountEl) {
          (async () => {
            const currentOrder = getSelectedOrder();
            if (!currentOrder) return;
            const settlement = state.paymentConfirmPayload || getOrderSettlementSummary(currentOrder);
            const finalPrice = Number(getFinalPayableAmount(currentOrder, settlement) || 0);
            const subtotalPrice = Number(settlement?.payableTotal || 0);
            const deductionApplied = Number(settlement?.deductionApplied || 0);
            const deductionLabel = deductionApplied > 0
              ? `Deduction (${Number(settlement?.nonReofferPayableCount || 0)} regular device${Number(settlement?.nonReofferPayableCount || 0) === 1 ? '' : 's'})`
              : 'Deduction (not applied)';

            const paymentMethodRaw = currentOrder?.paymentMethod || 'N/A';
            const paymentMethodFormatted = String(paymentMethodRaw).replace(/[_-]+/g, ' ').replace(/\b\w/g, m => m.toUpperCase());
            const paymentIdentifier = getPayoutInfoDisplay(currentOrder);
            const deepLink = getPaymentDeepLink(currentOrder, finalPrice);
            const checkAddressRow = document.getElementById('checkAddressRow');
            const checkAddressText = document.getElementById('checkAddressText');
            const checkAddress = currentOrder?.checkMailingAddress || currentOrder?.shippingInfo || {};
            const checkAddressLines = [
              checkAddress?.streetAddress,
              checkAddress?.addressUnit,
              [checkAddress?.city, checkAddress?.state, checkAddress?.zipCode || checkAddress?.zip].filter(Boolean).join(', ').trim()
            ].filter(Boolean);

            payoutAmountEl.textContent = `$${Number(finalPrice || 0).toFixed(2)}`;
            const subtotalEl = document.getElementById('paymentSubtotalAmount');
            const deductionLabelEl = document.getElementById('paymentDeductionLabel');
            const deductionAmountEl = document.getElementById('paymentDeductionAmount');
            const finalAmountEl = document.getElementById('paymentFinalAmount');
            if (subtotalEl) subtotalEl.textContent = `$${Number(subtotalPrice || 0).toFixed(2)}`;
            if (deductionLabelEl) deductionLabelEl.textContent = deductionLabel;
            if (deductionAmountEl) deductionAmountEl.textContent = deductionApplied > 0 ? `-$${deductionApplied.toFixed(2)}` : '$0.00';
            if (finalAmountEl) finalAmountEl.textContent = `$${Number(finalPrice || 0).toFixed(2)}`;
            const methodEl = document.getElementById('paymentMethod');
            const identifierEl = document.getElementById('paymentIdentifier');
            if (methodEl) methodEl.textContent = paymentMethodFormatted;
            if (identifierEl) identifierEl.textContent = paymentIdentifier;
            if (checkAddressRow) {
              const isCheck = String(paymentMethodRaw || '').toLowerCase() === 'check';
              checkAddressRow.classList.toggle('hidden', !isCheck);
              if (isCheck && checkAddressText) {
                checkAddressText.textContent = checkAddressLines.join('\n') || 'No mailing address provided.';
              }
            }
            if (deepLinkBtn) {
              if (deepLink?.url) {
                deepLinkBtn.href = deepLink.url;
                deepLinkBtn.textContent = deepLink.cta || 'Open Payment App';
                deepLinkBtn.style.display = 'inline-flex';
              } else {
                deepLinkBtn.href = '#';
                deepLinkBtn.textContent = 'No payment link available';
                deepLinkBtn.style.display = 'none';
              }
            }
            if (deepLinkHint) {
              deepLinkHint.textContent = deepLink?.note || 'Use the account details above to send payment.';
            }
          })();
        }
        
        if (paymentYesBtn) {
          paymentYesBtn.addEventListener("click", async () => {
            const order = getSelectedOrder();
            if (!order) return;

            const settlement = state.paymentConfirmPayload || getOrderSettlementSummary(order);
            const keys = settlement?.payableDeviceKeys || [];
            if (!keys.length) {
              toast("No payable devices found.", "error");
              return;
            }

            for (const key of keys) {
              await updateDeviceStatusInline(order.id, key, "completed");
            }
            const refreshedOrder = await withPerf(`firestore:getOrderAfterPayment:${order.id}`, () => getDoc(doc(db, 'orders', order.id)));
            if (refreshedOrder.exists()) {
              const latest = { id: refreshedOrder.id, ...refreshedOrder.data() };
              const aggregatedStatus = computeOrderStatus(latest);
              const completionStamp = new Date();

              if (aggregatedStatus === "completed") {
                await updateOrderStatusInline(order.id, "completed");
                const latestOrder = state.allOrders.find((entry) => entry.id === order.id);
                if (latestOrder) {
                  latestOrder.completedAt = completionStamp;
                }
                if (state.selectedOrderSnapshot?.id === order.id) {
                  state.selectedOrderSnapshot.completedAt = completionStamp;
                }
              } else {
                await withPerf(`firestore:updateOrderStatusAfterPayment:${order.id}`, () => updateDoc(doc(db, 'orders', order.id), {
                  status: aggregatedStatus,
                  updatedAt: completionStamp,
                }));
              }
            }

            try {
              const latestOrder = await fetchOrderPrintData(order.id);
              upsertOrderInState(latestOrder);
            } catch (refreshError) {
              console.warn(`Failed to refresh admin order state after payment for ${order.id}:`, refreshError);
            }

            await hydrateSelectedOrderDetails(order.id);
            filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
            toast(`Marked ${keys.length} device${keys.length === 1 ? '' : 's'} as paid/completed.`, "success");

            state.paymentConfirmModalOpen = false;
            state.paymentConfirmPayload = null;
            render();
          });
        }
      }

      if (state.unlockInfoModalOpen) {
        const closeBtn = document.getElementById("unlockInfoCloseBtn");
        const closeFooterBtn = document.getElementById("unlockInfoCloseBtnFooter");
        const continueQcBtn = document.getElementById("unlockInfoContinueQcBtn");
        const passwordWrongBtn = document.getElementById("unlockInfoPasswordWrongBtn");
        const overlay = document.getElementById("unlockInfoOverlay");
        const closeUnlockModal = () => {
          state.unlockInfoModalOpen = false;
          state.unlockInfoModalData = null;
          render();
        };
        if (closeBtn) closeBtn.addEventListener("click", closeUnlockModal);
        if (closeFooterBtn) closeFooterBtn.addEventListener("click", closeUnlockModal);
        if (overlay) {
          overlay.addEventListener("click", (event) => {
            if (event.target === overlay) closeUnlockModal();
          });
        }

        if (continueQcBtn) {
          continueQcBtn.addEventListener("click", async () => {
            const order = getSelectedOrder();
            const orderId = state.unlockInfoModalData?.orderId || order?.id;
            const deviceKey = state.unlockInfoModalData?.deviceKey || state.selectedDeviceKey;
            const hasUnlockInfo = Boolean(state.unlockInfoModalData?.unlockInfo);
            if (!orderId || !deviceKey) {
              closeUnlockModal();
              return;
            }

            try {
              if (hasUnlockInfo) {
                const result = await submitReqcUnlockResult(orderId, {
                  deviceKey,
                  result: 'worked',
                  notes: 'Issue marked fixed in re-QC. Continue with QC.',
                });
                if (result?.nextAction !== 'continue_qc') {
                  throw new Error('Unexpected re-QC response from server.');
                }
              }
              await hydrateSelectedOrderDetails(orderId);
              state.selectedDeviceKey = deviceKey;
              state.qcDeviceKey = deviceKey;
              state.unlockInfoModalOpen = false;
              state.unlockInfoModalData = null;
              state.qcOpen = true;
              state.modalScrollTop.qc = 0;
              state.qcStep = 1;
              state.qcData = null;
              render();
              toast('Issue marked fixed. Continue QC.', 'success');
              filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
            } catch (error) {
              console.error('Failed to continue re-QC flow', error);
              toast(error?.message || 'Failed to save re-QC result.', 'error');
            }
          });
        }

        if (passwordWrongBtn) {
          passwordWrongBtn.addEventListener("click", async () => {
            const order = getSelectedOrder();
            const orderId = state.unlockInfoModalData?.orderId || order?.id;
            const deviceKey = state.unlockInfoModalData?.deviceKey || state.selectedDeviceKey || null;
            if (!orderId || !deviceKey) {
              toast('Missing order/device context.', 'error');
              return;
            }
            try {
              const result = await handleAction(orderId, 'autoRequote', {
                skipConfirmation: true,
                body: { deviceKeys: [deviceKey] }
              });
              if (!result?.ok) {
                throw result?.error || new Error('Failed to send 75%-less re-offer.');
              }
              closeUnlockModal();
              toast('75%-less re-offer sent. Device moved to Re-offer Pending.', 'success');
              filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
            } catch (error) {
              console.error('Failed to send re-QC 75%-less re-offer', error);
              toast(error?.message || 'Failed to send 75%-less re-offer.', 'error');
            }
          });
        }

        const preview = document.querySelector("[data-unlock-pattern-preview]");
        if (preview) {
          const raw = String(preview.getAttribute("data-pattern-seq") || "").trim();
          const sequence = raw
            .split("-")
            .map((value) => Number(value))
            .filter((value) => Number.isFinite(value) && value >= 1 && value <= 9);
          const dots = Array.from(preview.querySelectorAll("[data-preview-dot]"));

          if (sequence.length && dots.length) {
            dots.forEach((dot) => {
              dot.classList.remove("bg-indigo-600", "border-indigo-600", "scale-110");
              dot.classList.add("bg-white", "border-slate-400");
            });

            let idx = 0;
            const tick = () => {
              if (!state.unlockInfoModalOpen) return;
              if (idx >= sequence.length) {
                setTimeout(() => {
                  if (!state.unlockInfoModalOpen) return;
                  dots.forEach((dot) => {
                    dot.classList.remove("bg-indigo-600", "border-indigo-600", "scale-110");
                    dot.classList.add("bg-white", "border-slate-400");
                  });
                  idx = 0;
                  tick();
                }, 700);
                return;
              }

              const id = sequence[idx];
              const dot = preview.querySelector(`[data-preview-dot="${id}"]`);
              if (dot) {
                dot.classList.remove("bg-white", "border-slate-400");
                dot.classList.add("bg-indigo-600", "border-indigo-600", "scale-110");
              }
              idx += 1;
              setTimeout(tick, 330);
            };

            setTimeout(tick, 200);
          }
        }
      }
    }
    // ----------------------------
    // AUTH
    // ----------------------------
    function resetAdminState() {
      if (unsubscribeOrders) unsubscribeOrders();
      unsubscribeOrders = null;
      if (state.deferredOrdersRenderTimer) {
        clearTimeout(state.deferredOrdersRenderTimer);
        state.deferredOrdersRenderTimer = null;
      }
      state.allOrders = [];
      state.currentFilteredOrders = [];
      state.currentFilteredDevices = [];
      state.currentActiveStatus = "all";
      state.currentSearchTerm = "";
      state.selectedOrderIds.clear();
      state.lastRenderedDeviceKeys = [];
      state.selectedOrderId = null;
      state.selectedOrderSnapshot = null;
      state.statusDropdownOpen = false;
      state.qcOpen = false;
      state.qcStep = 1;
      state.qcData = null;
      state.reofferOpen = false;
      state.reofferData = null;
      state.reofferValidation = { message: "", fields: {} };
      state.unlockInfoModalOpen = false;
      state.unlockInfoModalData = null;
      state.orderTextImportOpen = false;
      state.bulkDeleteCancelledInProgress = false;
      state.bulkVoidProgressVisible = false;
      state.bulkVoidProgressLabel = "";
      state.bulkVoidProgressPercent = 0;
      state.bulkVoidProgressDetails = "";
      state.modalScrollTop = { qc: 0, reoffer: 0, import: 0 };
      state.sidebarOpen = false;
      state.ordersLoading = false;
      state.ordersCacheHydrated = false;
      state.ordersCacheLoadedAt = 0;
      state.appBooting = false;
      state.appBootProgress = 0;
      state.appBootLabel = "Loading admin workspace…";
    }

    async function isUidAdmin(uid) {
      if (!uid) return false;
      const adminRef = doc(db, "admins", uid);
      const adminSnap = await withPerf(`firestore:isAdmin:${uid}`, () => getDoc(adminRef));
      return adminSnap.exists();
    }

    let authCheckVersion = 0;
    onAuthStateChanged(auth, async (u) => {
      perfMark('admin:auth-resolved');
      const currentCheckVersion = ++authCheckVersion;
      clearPendingSignedOutTimer();

      if (!u) {
        const hadCachedAdmin = !!state.user || !!readAdminAuthCache();
        if (hadCachedAdmin) {
          state.authLoading = true;
          render();
          pendingSignedOutTimer = setTimeout(async () => {
            pendingSignedOutTimer = null;
            if (auth.currentUser) {
              return;
            }
            await detachAdminNotifications();
            finalizeSignedOutState();
            render();
          }, 1200);
          return;
        }
        await detachAdminNotifications();
        finalizeSignedOutState();
        return;
      }

      state.authLoading = true;
      render();

      try {
        const allowed = await isUidAdmin(u.uid);
        if (currentCheckVersion !== authCheckVersion) return;

        if (!allowed) {
          await detachAdminNotifications();
          state.user = null;
          state.authLoading = false;
          state.authError = "Access denied. This account is not listed in admins.";
          writeAdminAuthCache(null);
          resetAdminState();
          try { await signOut(auth); } catch (signOutErr) { console.error(signOutErr); }
          filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: false });
          return;
        }

        state.authError = "";
        state.user = u;
        writeAdminAuthCache(u);
        state.authLoading = false;
        const hydratedFromCache = state.ordersCacheHydrated || await hydrateOrdersFromLocalCache();
        state.ordersLoading = !hydratedFromCache;
        if (!hydratedFromCache) {
          state.appBooting = true;
          state.appBootProgress = 14;
          state.appBootLabel = "Preparing admin workspace…";
          updateAdminBootUi();
          render();
        }
        await setupAdminNotifications(u);
        if (!hydratedFromCache) {
          state.appBootProgress = 22;
          state.appBootLabel = "Connecting to orders…";
          updateAdminBootUi();
        }
        requestAnimationFrame(() => {
          void startOrdersListener();
        });
      } catch (err) {
        console.error("Admin access check failed:", err);
        state.authLoading = false;
        if (state.user || readAdminAuthCache()) {
          state.user = state.user || readAdminAuthCache();
          state.authError = "";
          render();
          toast("Admin session check failed. Keeping current view and retrying on next sync.", "error");
          return;
        }
        await detachAdminNotifications();
        state.user = null;
        state.authError = "Could not verify admin access. Please try again.";
        resetAdminState();
        filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: false });
      }
    });
    // first paint (auth spinner)
    render();
  </script>
