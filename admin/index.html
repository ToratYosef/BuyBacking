    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[m]));

    function safeUpperTrim(s) { return String(s ?? "").trim().toUpperCase(); }
    function toDateAny(ts) {
      if (!ts) return null;

      return Number.isNaN(d.getTime()) ? null : d;
    }

      const d = toDateAny(ts);

    function getOrderAge(ts) {
      const d = toDateAny(ts);

      const diffMs = Math.max(0, Date.now() - d.getTime());

    }

    // ----------------------------
    // SPEC: status buckets + dropdown

    const STATUS_DROPDOWN_OPTIONS = [
      "order_pending",
      "pending_customer_send",
      "shipping_kit_requested",
      "kit_needs_printing",
      "needs_printing",
      "kit_on_the_way_to_customer",
      "kit_delivered",
      "kit_on_the_way_to_us",
      "delivered_to_us",
      "label_generated",
      "emailed",
      "issue_resolved",
      "phone_on_the_way",
      "received",
      "completed",
      "re-offered-pending",
      "re-offered-accepted",
      "re-offered-declined",
      "re-offered-auto-accepted",
      "return-label-generated",
      "cancelled"
    ];
    const KIT_PRINT_PENDING_STATUSES = new Set(["shipping_kit_requested", "kit_needs_printing", "needs_printing"]);
    const RECEIVED_VALUES = new Set(["received", "imei_checked", "delivered_to_us", "phone_on_the_way"]);
    const PAST_RECEIVED_VALUES = new Set(["received", "completed", "re-offered-accepted", "re-offered-declined", "re-offered-auto-accepted"]);
    function normalizeStatusKey(status) {
      const normalized = String(status || "").trim().toLowerCase();
      return normalized === "kit_sent" ? "kit_on_the_way_to_customer" : normalized;
    }
    function isCancelledStatusValue(status) {
      const normalized = normalizeStatusKey(status);
      return normalized === "cancelled" || normalized === "canceled";
    }
    function getOrderCurrentStatusValue(order) {
      // Deliberately read only current-status fields, never historical timelines.
      return normalizeStatusKey(order?.status ?? order?.currentStatus ?? order?.current_status);
    }
    function isReceivedStatusValue(status) {
      return RECEIVED_VALUES.has(normalizeStatusKey(status));
    }
    function isStatusPastReceived(status) {
      return PAST_RECEIVED_VALUES.has(normalizeStatusKey(status));
    }
    function isBalanceEmailStatus(order) {
      const s = normalizeStatusKey(order?.status);
      return s.includes("emailed_balance") || s.includes("emailed") && (order?.emailType === "balance");
    }
    function isLabelGenerationStage(order) {
      const s = normalizeStatusKey(order?.status);
      return s === "label_generated" || s === "needs_printing" || s === "kit_needs_printing";
    }
    function getStatusClass(status) {
      const s = normalizeStatusKey(status);
      if (!s || s === "unknown") return "bg-slate-100 text-slate-800 border-slate-200";
      if (s.includes("cancel")) return "bg-slate-100 text-slate-600 border-slate-200";
      if (s.includes("pending") || s.includes("needs_printing") || s.includes("kit_needs_printing")) return "bg-amber-100 text-amber-800 border-amber-200";
      if (s.includes("kit") || s.includes("label") || s.includes("transit") || s.includes("delivered_to_us") || s.includes("phone_on_the_way")) return "bg-blue-100 text-blue-800 border-blue-200";
      if (s.includes("issue_resolved") || s === "issue_resolved") return "bg-green-100 text-green-800 border-green-200";
      if (s.includes("emailed") || s.includes("received") || s.includes("imei_checked")) return "bg-indigo-100 text-indigo-800 border-indigo-200";
      if (s.includes("completed") || s.includes("paid")) return "bg-emerald-100 text-emerald-800 border-emerald-200";
      if (s.includes("re-offer") || s.includes("re_offer")) return "bg-purple-100 text-purple-800 border-purple-200";
      return "bg-slate-100 text-slate-800 border-slate-200";
    }
    function getStatusAccentBgClass(status) {
      const s = normalizeStatusKey(status);
      if (!s || s === "unknown") return "bg-slate-300";
      if (s.includes("cancel")) return "bg-slate-300";
      if (s.includes("pending") || s.includes("needs_printing") || s.includes("kit_needs_printing")) return "bg-amber-400";
      if (s.includes("kit") || s.includes("label") || s.includes("transit") || s.includes("delivered_to_us") || s.includes("phone_on_the_way")) return "bg-blue-500";
      if (s.includes("issue_resolved") || s === "issue_resolved") return "bg-green-500";

    }

    // ----------------------------
    // SPEC: device key + per-device entries
    // ----------------------------
    function buildOrderDeviceKey(orderId, deviceIndex = 0) {
      return `${orderId}::${deviceIndex}`;
    }
    function parseOrderDeviceKey(deviceKey) {
      const [orderId, deviceIndexStr] = String(deviceKey).split("::");
      const deviceIndex = Number.parseInt(deviceIndexStr || "0", 10);
      return { orderId, deviceIndex: Number.isFinite(deviceIndex) ? deviceIndex : 0 };
    }
    function normalizeQty(q) {
      const n = Number(q);
      if (!Number.isFinite(n)) return 1;
      return Math.max(1, Math.floor(n));
    }
    function getOrderDeviceEntries(order) {
      const items = Array.isArray(order?.items) ? order.items : [];
      if (!items.length) return [{ deviceIndex: 0, item: order, qtyIndex: 0 }];
      const out = [];
      let idx = 0;
      for (const it of items) {
        const qty = normalizeQty(it?.qty ?? it?.quantity ?? 1);
        for (let i = 0; i < qty; i++) {
          out.push({ deviceIndex: idx, item: it, qtyIndex: i });
          idx++;
        }
      }
      return out.length ? out : [{ deviceIndex: 0, item: order, qtyIndex: 0 }];
    }
    function getPerDeviceOffer(item, order) {
      const qty = normalizeQty(item?.qty ?? item?.quantity ?? 1);
      const direct = Number(item?.unitPrice ?? item?.price ?? item?.payout ?? item?.offerAmount ?? item?.estimatedQuote);
      if (Number.isFinite(direct)) return direct;
      const total = Number(item?.totalPayout ?? item?.estimatedQuote ?? order?.totalPayout ?? order?.estimatedQuote ?? order?.originalQuote);
      if (Number.isFinite(total)) return qty > 1 ? (total / qty) : total;
      return 0;
    }
    function isAcceptedReofferStatus(status) {
      const s = normalizeStatusKey(status);
      return s === 're-offered-accepted' || s === 're_offered_accepted' || s === 're-offered-auto-accepted' || s === 're_offered_auto_accepted' || s === 'requote_accepted';
    }
    function getAcceptedReofferPayout(order) {
      const candidates = [order?.reOffer?.newPrice, order?.reoffer?.newPrice, order?.finalPayoutAmount, order?.requoteAmount, order?.requote?.amount, order?.updatedQuote];
      for (const c of candidates) {
        const n = Number(c);
        if (Number.isFinite(n) && n > 0) return n;
      }
      return null;
    }
    function getOriginalPayout(order) {
      const candidates = [order?.originalQuote, order?.initialQuote, order?.quotedAmount, order?.totalPayout];
      for (const c of candidates) {
        const n = Number(c);
        if (Number.isFinite(n) && n > 0) return n;
      }
      return null;
    }
    function getOriginalReofferCap(order, deviceKey = null) {
      if (order && deviceKey) {
        const parsed = parseOrderDeviceKey(deviceKey);
        if (parsed?.orderId === order?.id && Number.isInteger(parsed.deviceIndex)) {
          const entries = getOrderDeviceEntries(order);
          const entry = entries.find((value) => value.deviceIndex === parsed.deviceIndex);
          if (entry?.item) {
            const perDevice = Number(getPerDeviceOffer(entry.item, order));
            if (Number.isFinite(perDevice) && perDevice > 0) return perDevice;
          }
        }
      }
      const originalOrderPayout = Number(getOriginalPayout(order));
      if (Number.isFinite(originalOrderPayout) && originalOrderPayout > 0) return originalOrderPayout;
      const fallbackOrderPayout = Number(getOrderPayoutTotal(order));
      if (Number.isFinite(fallbackOrderPayout) && fallbackOrderPayout > 0) return fallbackOrderPayout;
      return null;
    }
    function getDeviceAcceptedReofferPayout(order, deviceKey, fallbackOffer = null) {
      const byKey =
        order?.reOfferByDevice?.[deviceKey]?.newPrice ??
        order?.reofferByDevice?.[deviceKey]?.newPrice ??
        order?.deviceReofferByKey?.[deviceKey]?.newPrice ??
        order?.deviceReOfferByKey?.[deviceKey]?.newPrice;
      const direct = Number(byKey);
      if (Number.isFinite(direct) && direct > 0) return direct;
      const totalDevices = getOrderDeviceEntries(order).length;
      if (totalDevices === 1) {
        const orderLevel = Number(getAcceptedReofferPayout(order));
        if (Number.isFinite(orderLevel) && orderLevel > 0) return orderLevel;
      }
      const fb = Number(fallbackOffer);
      return Number.isFinite(fb) && fb > 0 ? fb : null;
    }
    function getDeviceSummary(order) {
      const entries = getOrderDeviceEntries(order);
      const allKeys = entries.map((entry) => buildOrderDeviceKey(order.id, entry.deviceIndex));
      const qcMap = order?.qcDataByDevice || {};
      const qcCompletedCount = allKeys.filter((k) => !!qcMap[k]).length;
      const allQcCompleted = allKeys.length > 0 && qcCompletedCount === allKeys.length;
      const declinedCount = allKeys.filter((k) => {
        const s = getDeviceStatus(order, k);
        return s === 're-offered-declined' || s === 're_offered_declined';
      }).length;
      return { allKeys, allQcCompleted, qcCompletedCount, totalDevices: allKeys.length, declinedCount };
    }
    function isDeclinedReofferStatus(status) {
      const s = normalizeStatusKey(status);
      return s === 're-offered-declined' || s === 're_offered_declined';
    }
    function getOrderSettlementSummary(order) {
      const entries = getOrderDeviceEntries(order);
      const payableDeviceKeys = [];
      const declinedDeviceKeys = [];
      let payableTotal = 0;

      for (const entry of entries) {
        const item = entry.item || {};
        const deviceKey = buildOrderDeviceKey(order.id, entry.deviceIndex);
        const deviceStatus = getDeviceStatus(order, deviceKey);
        const hasQcData = !!(order?.qcDataByDevice?.[deviceKey] && Object.keys(order.qcDataByDevice[deviceKey]).length);
        const acceptedReoffer = isAcceptedReofferStatus(deviceStatus);
        const declinedReoffer = isDeclinedReofferStatus(deviceStatus);
        const normalizedStatus = normalizeStatusKey(deviceStatus);

        if (declinedReoffer) {
          declinedDeviceKeys.push(deviceKey);
          continue;
        }

        if (normalizedStatus === 'completed' || normalizedStatus === 'return-label-generated') {
          continue;
        }

        const qcPassedStatuses = new Set(['received', 'imei_checked', 'requote_accepted']);
        const isQcPassedPayable = hasQcData && qcPassedStatuses.has(normalizedStatus);

        if (acceptedReoffer || isQcPassedPayable) {
          const baseOffer = Number(getPerDeviceOffer(item, order) || 0);
          const acceptedOffer = Number(getDeviceAcceptedReofferPayout(order, deviceKey, baseOffer));
          const payout = acceptedReoffer && Number.isFinite(acceptedOffer) && acceptedOffer > 0 ? acceptedOffer : baseOffer;
          payableDeviceKeys.push(deviceKey);
          payableTotal += Number.isFinite(payout) ? payout : 0;
        }
      }

      return {
        payableDeviceKeys,
        payableCount: payableDeviceKeys.length,
        payableTotal,
        declinedDeviceKeys,
        declinedCount: declinedDeviceKeys.length,
      };
    }
    function formatCarrierLabel(carrierRaw) {
      const c = String(carrierRaw || '').trim().toLowerCase();
      if (!c) return 'N/A';
      if (c === 'tmobile' || c === 't-mobile') return 'T-Mobile';
      if (c === 'att' || c === 'at&t' || c === 'at and t') return 'AT&T';
      if (c === 'verizon') return 'Verizon';
      if (c === 'unlocked') return 'Unlocked';
      return c.replace(/\b\w/g, (m) => m.toUpperCase());
    }
    function getPayoutInfoDisplay(order) {
      const method = normalizeStatusKey(order?.paymentMethod || '');
      const d = order?.paymentDetails || {};
      const identifier = String(order?.paymentIdentifier || '').trim();
      const cashTag = String(d?.cashappTag || d?.cashAppTag || identifier || '').trim();
      if (method === 'cashapp') {
        if (!cashTag) return 'N/A';
        return cashTag.startsWith('$') ? cashTag : `$${cashTag}`;

      if (method === 'paypal') return String(d?.paypalEmail || identifier || '').trim() || 'N/A';

      if (method === 'check') return String(d?.checkPayableTo || 'Check via mail').trim();
      if (method === 'echeck') return String(d?.accountHolderName || d?.accountName || d?.email || identifier || 'E-Check details on file').trim();
      return identifier || String(d?.username || d?.handle || d?.email || '').trim() || 'N/A';
    }
    function getPaymentDeepLink(order, amount) {
      const method = normalizeStatusKey(order?.paymentMethod || '');
      const d = order?.paymentDetails || {};
      const identifierRaw = String(getPayoutInfoDisplay(order) || '').trim();
      const identifier = identifierRaw.replace(/^\$/, '').trim();
      const safeAmount = Number.isFinite(amount) ? Number(amount) : 0;
      const amountFixed = safeAmount.toFixed(2);

      if (method === 'cashapp' && identifier) {
        const cashtag = identifier.startsWith('$') ? identifier : `$${identifier}`;
        return {
          url: `https://cash.app/${encodeURIComponent(cashtag)}/${amountFixed}`,
          cta: 'Open Cash App',
          note: 'Amount is prefilled.'
        };
      }

      if (method === 'paypal') {
        const paypalEmail = String(d?.paypalEmail || '').trim();
        if (identifier && !identifier.includes('@')) {
          return {
            url: `https://www.paypal.com/paypalme/${encodeURIComponent(identifier)}/${amountFixed}`,
            cta: 'Open PayPal',
            note: 'Amount is prefilled.'
          };
        }
        if (paypalEmail) {
          return {
            url: `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${encodeURIComponent(paypalEmail)}&amount=${encodeURIComponent(amountFixed)}&currency_code=USD`,
            cta: 'Open PayPal',
            note: 'Recipient and amount are prefilled.'
          };
        }
      }

      if (method === 'zelle') {
        return {
          url: 'https://www.zellepay.com/',
          cta: 'Open Zelle',
          note: 'Zelle does not support reliable web prefills; send manually using the details shown.'
        };
      }

      return null;
    }
    function getOrderItemsSearchText(order) {
      // Used by search pipeline
      const entries = getOrderDeviceEntries(order);
      const bits = [];
      for (const e of entries) {
        const it = e.item || {};
        bits.push(it.device, it.model, it.storage, it.carrier, it.condition, it.color, it.imei, it.serial);
      }
      return safeUpperTrim(bits.filter(Boolean).join(" "));
    }
    // ----------------------------
    // SPEC: tracking hints + tracking # detection
    // ----------------------------
    function getAnyTrackingNumber(order) {
      return (
        order?.trackingNumber ||
        order?.inboundTrackingNumber ||
        order?.outboundTrackingNumber ||
        order?.labelTrackingNumber ||
        order?.uspsTrackingNumber ||
        order?.uspsLabelTrackingNumber ||
        order?.labelTrackingStatus?.trackingNumber ||
        order?.labelTrackingStatus?.tracking_number ||
        order?.kitTrackingStatus?.trackingNumber ||
        order?.kitTrackingStatus?.tracking_number ||
        ""
      );
    }
    function getShipEngineLabelEntries(order) {
      const labels = order?.shipEngineLabels;
      if (!labels) return [];
      if (Array.isArray(labels)) {
        return labels
          .map((value, index) => ({ key: String(value?.key || `label_${index + 1}`), value }))
          .filter((entry) => entry.value && typeof entry.value === "object");
      }
      if (typeof labels === "object") {
        return Object.entries(labels)
          .filter(([, value]) => value && typeof value === "object")
          .map(([key, value]) => ({ key, value }));
      }
      return [];
    }
    function shipEngineLabelTrackings(order) {
      const nums = [];
      for (const { value } of getShipEngineLabelEntries(order)) {
        if (value?.trackingNumber) nums.push(value.trackingNumber);
        if (value?.tracking_number) nums.push(value.tracking_number);
      }
      return nums.filter(Boolean);
    }
    function hasKitTrackingNumbers(order) {
      const nums = [
        order?.outboundTrackingNumber,
        order?.inboundTrackingNumber,
        order?.trackingNumber,
        order?.kitTrackingStatus?.trackingNumber,
        order?.kitTrackingStatus?.tracking_number,
        ...shipEngineLabelTrackings(order),
      ].filter(Boolean);
      return nums.length > 0;
    }
    function hasEmailTrackingNumbers(order) {
      const nums = [
        order?.labelTrackingNumber,
        order?.trackingNumber,
        order?.uspsTrackingNumber,
        order?.uspsLabelTrackingNumber,
        order?.labelTrackingStatus?.trackingNumber,
        order?.labelTrackingStatus?.tracking_number,
        ...shipEngineLabelTrackings(order),
      ].filter(Boolean);
      return nums.length > 0;
    }
    function matchesKitTrackingHints(order) {
      const s = normalizeStatusKey(order?.status);

    async function apiCall(endpoint, method = "GET", body = null) {
      const user = auth.currentUser;
      const token = user ? await user.getIdToken() : null;
      const headers = {
        ...(token ? { "Authorization": `Bearer ${token}` } : {}),
      };
      // send JSON only if body present
      const safeEndpoint = endpoint.startsWith("/") ? endpoint : `/${endpoint}`;
      const config = { method, headers };
      if (body !== null && body !== undefined) {
        config.headers["Content-Type"] = "application/json";
        config.body = JSON.stringify(body);
      }
      const res = await withPerf(`network:api:${safeEndpoint}`, () => fetch(`${API_BASE_URL}${safeEndpoint}`, config));
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || data.error || "API Request Failed");
      return data;
    }
    const apiGet = (p) => apiCall(p, "GET");
    const apiPost = (p, b) => apiCall(p, "POST", b ?? {});
    const apiPut = (p, b) => apiCall(p, "PUT", b ?? {});
    const apiDelete = (p) => apiCall(p, "DELETE", null);

    function getOrderPayoutTotal(order) {
      const explicit = Number(order?.totalPayout ?? order?.total_payout ?? order?.payoutTotal ?? order?.payout_total ?? NaN);
      if (Number.isFinite(explicit)) return explicit;
      const items = Array.isArray(order?.items) ? order.items : [];
      if (!items.length) {
        const single = Number(order?.price ?? order?.payout ?? 0);
        return Number.isFinite(single) ? single : 0;
      }
      let sum = 0;
      for (const it of items) {
        const qty = normalizeQty(it?.qty ?? it?.quantity ?? 1);
        const unit = Number.parseFloat(it?.price ?? it?.payout ?? 0);
        sum += (Number.isFinite(unit) ? unit : 0) * qty;
      }
      return sum;
    }

    function getDeviceUnlockInfo(order, deviceKey) {
      if (!order || !deviceKey) return null;
      const fromDeviceMap = order?.unlockInfoByDevice?.[deviceKey];

      const source = fromDeviceMap || fromIssueMap;
      if (!source || typeof source !== 'object') return null;

      const method = String(source.method || '').trim().toLowerCase();
      const value = String(source.value || '').trim();
      let patternPath = Array.isArray(source.patternPath)
        ? source.patternPath.map((value) => Number(value)).filter((value) => Number.isFinite(value) && value >= 1 && value <= 9)
        : [];

      if (!patternPath.length && method === 'pattern' && value) {
        patternPath = value
          .split('-')
          .map((value) => Number(value))
          .filter((value) => Number.isFinite(value) && value >= 1 && value <= 9);
      }

      return {
        reason: source.reason || 'password_locked',
        method,
        value,
        patternPath,
        updatedAt: source.updatedAt || null,
      };
    }

    function getFocusedDevice(order) {
      const entries = getOrderDeviceEntries(order);
      const fallbackEntry = entries[0] || { deviceIndex: 0, item: order, qtyIndex: 0 };
      const key = state.selectedDeviceKey;
      if (!key) return { isFocused: false, deviceKey: null, entry: null, entries, label: `Devices (${entries.length})` };
      const parsed = parseOrderDeviceKey(key);
      if (parsed.orderId !== order?.id) return { isFocused: false, deviceKey: null, entry: null, entries, label: `Devices (${entries.length})` };
      const entry = entries.find(e => e.deviceIndex === parsed.deviceIndex) || fallbackEntry;

    function getDeviceStatus(order, deviceKey) {
      if (!order || !deviceKey) return normalizeStatusKey(order?.status || 'order_pending');
      return normalizeStatusKey(order?.deviceStatusByKey?.[deviceKey] || order?.status || 'order_pending');
    }
    
    // Compute order status from all device statuses
    // Pre-receive statuses (order_pending through label_generated) are order-level
    // Post-receive statuses (received onwards) are per-device
    function computeOrderStatus(order) {
      if (!order) return 'order_pending';
      
      // If order hasn't been received yet, use order-level status
      const currentOrderStatus = normalizeStatusKey(order.status);
      const preReceiveStatuses = ['order_pending', 'needs_printing', 'kit_needs_printing', 'shipping_kit_requested', 'label_generated', 'kit_on_the_way_to_us', 'phone_on_the_way', 'delivered_to_us'];
      if (preReceiveStatuses.includes(currentOrderStatus)) {
        return currentOrderStatus;
      }
      
      // Get all devices from order (qty-expanded for consistent per-device status)
      const entries = getOrderDeviceEntries(order);
      if (entries.length === 0) return currentOrderStatus;
      
      // Get status for each device
      const deviceStatuses = entries.map((entry) => {
        const deviceKey = buildOrderDeviceKey(order.id, entry.deviceIndex);
        return getDeviceStatus(order, deviceKey);
      });
      
      // Status priority for aggregation (higher index = more progressed)
      const statusPriority = {
        'received': 0,
        'imei_checked': 1,
        'emailed': 2,
        're-offered-pending': 3,
        're-offered-declined': 4,
        're-offered-accepted': 5,
        'completed': 6,
        'return-label-generated': 7
      };
      
      // Find the least progressed status (minimum priority)
      let minPriority = Infinity;
      let minStatus = 'received';
      
      for (const status of deviceStatuses) {
        const priority = statusPriority[status] ?? 0;
        if (priority < minPriority) {
          minPriority = priority;
          minStatus = status;
        }
      }
      
      // Special case: if all devices are completed, order is completed
      if (deviceStatuses.every(s => s === 'completed' || s === 're-offered-declined' || s === 'return-label-generated')) {
        return 'completed';
      }
      
      return minStatus;
    }

    function getLastUpdateTimestamp(order) {

      try {
        let cursor = null;
        let loaded = [];
        while (true) {
          if (loadVersion !== ordersLoadVersion) return;
          const ordersQuery = cursor
            ? query(collection(db, "orders"), orderBy("createdAt", "desc"), startAfter(cursor), limit(ADMIN_ORDERS_CHUNK_SIZE))
            : query(collection(db, "orders"), orderBy("createdAt", "desc"), limit(ADMIN_ORDERS_CHUNK_SIZE));

          const snapshot = await withPerf(`firestore:orders-chunk:${loaded.length}`, () => getDocs(ordersQuery));
          if (loadVersion !== ordersLoadVersion) return;
          if (snapshot.empty) break;

          const chunkOrders = snapshot.docs.map((d) => {
            const data = d.data();
            const createdAtMillis = data.createdAt?.seconds ? data.createdAt.seconds * 1000 : (toDateAny(data.createdAt)?.getTime() || 0);
            return { id: d.id, ...data, createdAtMillis };
          });

          loaded = loaded.concat(chunkOrders);
          loaded.sort((a, b) => (b.createdAtMillis || 0) - (a.createdAtMillis || 0));
          state.allOrders = loaded;

          if (loaded.length === chunkOrders.length) {

          cursor = snapshot.docs[snapshot.docs.length - 1] || null;

          const failed = Number(result?.failed || 0);
          const scanned = Number(result?.scanned || 0);
          const totalCandidates = Number(result?.totalCandidates || scanned);

          totalCancelled += cancelled;
          totalSkipped += skipped;
          totalFailed += failed;
          totalScanned += scanned;

          const nextSkipped = Array.isArray(result?.skippedEntries)
            ? result.skippedEntries.slice(0, 5).map((entry) => `#${entry.orderId}: ${entry.reason}`)
            : [];
          const nextFailed = Array.isArray(result?.failedEntries)
            ? result.failedEntries.slice(0, 5).map((entry) => `#${entry.orderId}: ${entry.reason}`)
            : [];

          for (const sample of nextSkipped) {
            if (skippedSamples.length >= 5) break;
            skippedSamples.push(sample);
          }
          for (const sample of nextFailed) {
            if (failedSamples.length >= 5) break;
            failedSamples.push(sample);
          }

          hasMore = Boolean(result?.hasMore);

          const remainingEstimate = hasMore ? Math.max(0, totalCandidates - scanned) : 0;
          const estimatedTotal = Math.max(totalScanned + remainingEstimate, 1);
          const rawPercent = Math.round((totalScanned / estimatedTotal) * 100);
          const progressPercent = hasMore ? Math.min(97, rawPercent) : 100;

          state.bulkVoidProgressLabel = loadingLabel || "Processing…";
          state.bulkVoidProgressPercent = progressPercent;
          state.bulkVoidProgressDetails = `Batch ${batchCount}: scanned ${totalScanned}, cancelled ${totalCancelled}, skipped ${totalSkipped}, failed ${totalFailed}`;
          render();

          if (!hasMore) {
            break;
          }
        }

        state.bulkVoidProgressPercent = 100;
        state.bulkVoidProgressDetails = `Done: scanned ${totalScanned}, cancelled ${totalCancelled}, skipped ${totalSkipped}, failed ${totalFailed}`;
        render();

        alert(
          `Bulk void complete.\n\n` +
          `Scanned: ${totalScanned}\n` +
          `Cancelled: ${totalCancelled}\n` +
          `Skipped: ${totalSkipped}\n` +
          `Failed: ${totalFailed}\n\n` +
          (skippedSamples.length ? `Skipped samples:\n- ${skippedSamples.join("\n- ")}\n\n` : "") +
          (failedSamples.length ? `Failed samples:\n- ${failedSamples.join("\n- ")}\n` : "")
        );
      } catch (error) {
        toast(error?.message || "Bulk void action failed", "error");
      } finally {
        state[inProgressStateKey] = false;
        state.bulkVoidProgressVisible = false;
        state.bulkVoidProgressLabel = "";
        state.bulkVoidProgressPercent = 0;
        state.bulkVoidProgressDetails = "";
        const liveBtn = document.getElementById(buttonEl.id) || buttonEl;
        if (liveBtn) {
          liveBtn.disabled = false;
          liveBtn.textContent = originalText || "Run";
        }
        filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
      }
    }

    async function runBulkDeleteCancelledOrders(buttonEl) {
      if (!buttonEl || state.bulkDeleteCancelledInProgress) return;
      const cancelledOrders = (state.allOrders || []).filter((order) => isCancelledStatusValue(getOrderCurrentStatusValue(order)));
      const cancelledOrderIds = Array.from(new Set(cancelledOrders.map((order) => String(order?.id || "").trim()).filter(Boolean)));
      if (!cancelledOrderIds.length) {
        toast('No canceled orders to delete', 'info');
        return;
      }
      const batchSize = 100;
      const totalBatches = Math.ceil(cancelledOrderIds.length / batchSize);

      const confirmed = await showConfirmation({
        title: 'Delete all canceled orders?',
        message: `This will permanently delete ${cancelledOrderIds.length} canceled order(s) in batches of up to ${batchSize}. This cannot be undone.`,
        confirmText: 'Delete All',
        cancelText: 'Keep Orders',
        confirmClass: 'bg-rose-600 hover:bg-rose-700'
      });
      if (!confirmed) return;

      const originalText = buttonEl.textContent;
      state.bulkDeleteCancelledInProgress = true;
      state.bulkVoidProgressVisible = true;
      state.bulkVoidProgressLabel = 'Deleting canceled orders…';
      state.bulkVoidProgressPercent = 0;
      state.bulkVoidProgressDetails = `Starting 0/${cancelledOrderIds.length} (batch 0/${totalBatches})`;
      buttonEl.disabled = true;
      buttonEl.textContent = 'Deleting canceled orders…';
      render();

      let deleted = 0;
      let notFound = 0;
      let failed = 0;
      let processed = 0;

      for (let i = 0; i < cancelledOrderIds.length; i += batchSize) {
        const batchOrderIds = cancelledOrderIds.slice(i, i + batchSize);
        try {
          const response = await apiPost('/orders/bulk-delete', { orderIds: batchOrderIds });
          const deletedIds = Array.isArray(response?.deleted) ? response.deleted.map((id) => String(id)) : [];
          const notFoundIds = Array.isArray(response?.notFound) ? response.notFound.map((id) => String(id)) : [];
          const failedEntries = Array.isArray(response?.failed) ? response.failed : [];

          deleted += deletedIds.length;
          notFound += notFoundIds.length;
          failed += failedEntries.length;

          const removedIdSet = new Set([...deletedIds, ...notFoundIds]);
          if (removedIdSet.size) {
            state.allOrders = (state.allOrders || []).filter((order) => !removedIdSet.has(String(order?.id || '')));
          }
          if (failedEntries.length) {
            failedEntries.slice(0, 5).forEach((entry) => {
              const failedOrderId = entry?.orderId || entry?.id || 'unknown';
              console.error(`Failed to bulk delete canceled order ${failedOrderId}`, entry?.error || entry);
            });
          }
        } catch (error) {
          failed += batchOrderIds.length;
          console.error(`Failed to delete canceled order batch ${Math.floor(i / batchSize) + 1}`, error);
        }

        processed += batchOrderIds.length;
        const batchNumber = Math.floor(i / batchSize) + 1;
        state.bulkVoidProgressPercent = Math.round((processed / cancelledOrderIds.length) * 100);
        state.bulkVoidProgressDetails = `Processed ${processed}/${cancelledOrderIds.length} • batch ${batchNumber}/${totalBatches} • deleted ${deleted} • not found ${notFound} • failed ${failed}`;
        filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
        await new Promise((resolve) => setTimeout(resolve, 0));
      }

      state.bulkDeleteCancelledInProgress = false;
      state.bulkVoidProgressPercent = 100;
      state.bulkVoidProgressDetails = `Done • deleted ${deleted} • not found ${notFound} • failed ${failed}`;
      filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });

      setTimeout(() => {
        state.bulkVoidProgressVisible = false;
        state.bulkVoidProgressLabel = '';
        state.bulkVoidProgressPercent = 0;
        state.bulkVoidProgressDetails = '';
        render();
      }, 1200);

      const liveBtn = document.getElementById(buttonEl.id) || buttonEl;
      if (liveBtn) {
        liveBtn.disabled = false;
        liveBtn.textContent = originalText || 'Delete Canceled Orders';
      }
      if (failed) toast(`Bulk delete complete: ${deleted} deleted, ${notFound} not found, ${failed} failed`, 'error');
      else toast(`Bulk delete complete: ${deleted} deleted, ${notFound} not found`, 'success');
    }

    function getLabelOptions(order) {
      // Returns array of { key, id, label }
      const opts = [];
      const seenIds = new Set();
      for (const { key, value } of getShipEngineLabelEntries(order)) {
        const status = String(value?.voidStatus || value?.status || value?.state || "active").toLowerCase();
        if (status === "voided" || value?.voidedAt) continue;
        const id = value?.labelId || value?.label_id || value?.id;
        if (!id || seenIds.has(String(id))) continue;
        seenIds.add(String(id));
        const tracking = value?.trackingNumber || value?.tracking_number || "";
        const display = value?.displayName || key || "ShipEngine Label";
        opts.push({ key: String(key), id: String(id), label: `${display}${tracking ? ` (${tracking})` : ""}` });
      }
      if (order?.shippingLabelId && !seenIds.has(String(order.shippingLabelId))) {
        opts.push({ key: "primary", id: String(order.shippingLabelId), label: "Primary Label" });
        seenIds.add(String(order.shippingLabelId));
      }
      if (order?.easypostLabelId && !seenIds.has(String(order.easypostLabelId))) {
        opts.push({ key: "easypost", id: String(order.easypostLabelId), label: "EasyPost Label" });
      }
      return opts;
    }

          const selections = options.map(o => ({ key: o.key, id: o.id }));

    async function handleAction(orderId, actionType, options = {}) {
      try {
        // Add confirmations for critical actions
        if (['reOffer', 'markCompleted', 'autoRequote', 'cancelOrder', 'deleteOrder'].includes(actionType)) {
          const confirmMessages = {
            'reOffer': 'Send re-offer to customer?\n\nThis will notify the customer with updated pricing and conditions.',
            'markCompleted': 'Mark this order as completed?\n\nThis will finalize the order and may trigger payment processing.',
            'autoRequote': 'Finalize 75% reduced payout?\n\nThis will automatically adjust the payout to 75% of original amount.',
            'cancelOrder': 'Cancel this order?\n\nThis action will cancel the order and may void any labels.',
            'deleteOrder': 'Delete this order permanently?\n\nThis action cannot be undone!'
          };
          const confirmClasses = {
            'deleteOrder': 'bg-rose-600 hover:bg-rose-700',
            'cancelOrder': 'bg-orange-600 hover:bg-orange-700',
            'autoRequote': 'bg-amber-600 hover:bg-amber-700',
            'reOffer': 'bg-purple-600 hover:bg-purple-700',
            'markCompleted': 'bg-emerald-600 hover:bg-emerald-700'
          };
          const confirmed = await showConfirmation({
            title: 'Confirm Action',
            message: confirmMessages[actionType] || 'Are you sure you want to proceed?',
            confirmText: actionType === 'deleteOrder' ? 'Delete' : actionType === 'cancelOrder' ? 'Cancel Order' : 'Confirm',
            cancelText: 'Go Back',
            confirmClass: confirmClasses[actionType] || 'bg-indigo-600 hover:bg-indigo-700'
          });
          if (!confirmed) return;
        }
        
        // tracking guard
        const order = state.allOrders.find(o => o.id === orderId);
        if ((actionType === "refreshKitTracking" || actionType === "refreshEmailTracking" || actionType === "updateTracking") && order && isStatusPastReceived(order.status)) {
          toast("Skipping tracking refresh: order is past received", "info");
          return;
        }
        let endpoint = "";
        let method = "POST";
        let body = options?.body ?? null;
        switch (actionType) {
          case "generateLabel": {
            await apiPost(`/generate-label/${orderId}`, {});
            const refreshedOrder = await fetchOrderPrintData(orderId);
            const labelUrls = getSavedLabelUrls(refreshedOrder);
            if (labelUrls.length) {
              labelUrls.forEach((labelUrl) => window.open(labelUrl, "_blank", "noopener,noreferrer"));
              toast(`Opened ${labelUrls.length} label${labelUrls.length === 1 ? "" : "s"} in new tab${labelUrls.length === 1 ? "" : "s"}`, "success");
            } else {
              toast("Label generated, but no saved label URLs were returned yet", "info");
            }
            filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
            return;
          }
          case "markReceived":
            endpoint = `/orders/${orderId}/status`;
            method = "PUT";
            body = { status: "received", ...(options?.body || {}) };
            break;
          case "markCompleted":
            endpoint = `/orders/${orderId}/status`;
            method = "PUT";
            body = { status: "completed", ...(options?.body || {}) };
            break;
          case "sendReturnLabel":
            if (order) {
              const settlement = getOrderSettlementSummary(order);
              if (!settlement.declinedCount) {
                toast("No re-offer declined devices found for return label.", "error");
                return;
              }
              const mailClass = settlement.declinedCount >= 5 ? "priority" : "first_class";
              endpoint = `/orders/${orderId}/return-label`;
              method = "POST";
              body = {
                mailClass,
                declinedDeviceCount: settlement.declinedCount,
                declinedDeviceKeys: settlement.declinedDeviceKeys,
              };
              break;
            }
            endpoint = `/orders/${orderId}/return-label`;
            method = "POST";
            body = {};
            break;
          case "markKitSent":
            endpoint = `/orders/${orderId}/mark-kit-sent`;
            method = "POST";
            body = {};
            break;
          case "sendReviewRequest":
            endpoint = `/orders/${orderId}/send-review-request`;
            method = "POST";
            body = {};
            break;
          case "autoRequote":
            endpoint = `/orders/${orderId}/auto-requote`;
            method = "POST";
            body = {}; // ensured non-null
            break;
          case "refreshKitTracking":
            endpoint = `/refresh-tracking`;
            method = "POST";
            body = { orderId, type: "kit" };
            break;
          case "refreshEmailTracking":
            endpoint = `/refresh-tracking`;
            method = "POST";
            body = { orderId, type: "email" };
            break;
          case "updateTracking":
            endpoint = `/refresh-tracking`;
            method = "POST";
            body = { orderId, type: matchesKitTrackingHints(order) ? "kit" : "email" };
            break;
          case "cancelOrder":
            // uses /orders/{id}/cancel, caller can pass { body:{voidLabels:true} } etc
            endpoint = `/orders/${orderId}/cancel`;
            method = "POST";
            body = options?.body ?? {};
            break;
          case "deleteOrder":
            endpoint = `/orders/${orderId}`;
            method = "DELETE";
            body = null;
            break;
          // condition email (exact)
          case "sendConditionEmail":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = options?.body ?? {}; // { reason, notes?, label? }
            break;
          // re-offer (exact)
          case "reOffer":
            endpoint = `/orders/${orderId}/re-offer`;
            method = "POST";
            body = options?.body ?? {}; // { newPrice, reasons, comments }
            break;
          // New Actions from JSON Spec
          case "manualFulfill":
            // "Order Manually Fulfilled" -> usually implies marking it completed or kit to customer without generating label
            // For now, prompt for intended status or set to kit_on_the_way_to_customer/completed?
            // Spec says "Order Manually Fulfilled", typically this means "mark as completed" in simple systems, 
            // or "kit to customer" manually. I'll default to marking kit to customer for now or completed if the user confirms.
            const manualOk = await showConfirmation({
              title: 'Manual Fulfillment',
              message: 'Mark this order as manually fulfilled (completed)?',
              confirmText: 'Mark Completed',
              confirmClass: 'bg-emerald-600 hover:bg-emerald-700'
            });
            if(!manualOk) return;
            endpoint = `/orders/${orderId}/status`;
            method = "PUT";
            body = { status: "completed", manual: true };
            break;
          case "emailBalance":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = { reason: "outstanding_balance", label: "Email Outstanding Balance Notice", ...(options?.body || {}) };
            break;
          case "emailLocked":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = { reason: "password_locked", label: "Email Password Lock Notice", ...(options?.body || {}) };
            break;
          case "emailStolen":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = { reason: "stolen", label: "Email Blacklisted Notice", ...(options?.body || {}) };
            break;
          case "emailBlacklisted":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = { reason: "stolen", label: "Email Blacklisted Notice", ...(options?.body || {}) };
            break;
          case "emailFmi":
            endpoint = `/orders/${orderId}/send-condition-email`;
            method = "POST";
            body = { reason: "fmi_active", label: "Email FMI / Activation Lock Notice", ...(options?.body || {}) };
            break;
          case "markPaid":
          case "payNow":
            // Re-offered accepted payment flow
            endpoint = `/orders/${orderId}/status`;
            method = "PUT";
            body = { status: "completed" };
            break;
          case "printDocs":
            await printBundle(orderId, {
              includeAllPackingSlips: options?.includeAllPackingSlips !== false,
              deviceIndex: Number.isInteger(options?.deviceIndex) ? options.deviceIndex : null
            });
            return;
          case "printPacking":
            await printPackingSlip(orderId, options?.deviceIndex);
            return;
          case "voidLabels":
              // Just a UI trigger to switch tab, no API call here directly unless submitted
              // But if we want to trigger the void modal logic:
              // The caller usually handles UI. If here, maybe trigger generic void?
              // I'll leave this as a UI-only handler in the event listener, but if it reaches here:
              return; 
          case "clearData":
              // Placeholder for "Clear Saved Shipping Data"
              toast("Clear data not implemented", "info");
              return;
          default:
            toast(`Unknown action: ${actionType}`, "error");
            return;
        }
        let actionResult = null;
        let labelWindow = null;
        if (actionType === 'sendReturnLabel') {
          labelWindow = window.open('', '_blank', 'noopener,noreferrer');
        }

        if (method === "GET") actionResult = await apiGet(endpoint);
        else if (method === "POST") actionResult = await apiPost(endpoint, body ?? {});
        else if (method === "PUT") await apiPut(endpoint, body ?? {});
        else if (method === "DELETE") await apiDelete(endpoint);

        if (actionType === 'sendReturnLabel') {
          const returnLabelUrl = actionResult?.returnLabelUrl || actionResult?.labelUrl || null;
          if (returnLabelUrl && labelWindow && !labelWindow.closed) {
            labelWindow.location = returnLabelUrl;
          } else if (labelWindow && !labelWindow.closed) {
            labelWindow.close();
          }

          if (returnLabelUrl) {
            toast('Return label opened in a new tab.', 'success');
          } else {
            toast('Return label generated, but no label URL was returned.', 'info');
          }
        }

        await hydrateSelectedOrderDetails(orderId);
        toast(`Action ${actionType} success`, "success");
        // refresh order data by re-running filter (Firestore will also push updates)
        filterAndRenderOrders(state.currentActiveStatus, state.currentSearchTerm, { preservePage: true });
      } catch (e) {
        console.error(e);
        toast(`Action failed: ${e.message}`, "error");
      }
    }
    async function saveQc(orderId, deviceKey, qcData) {
      try {
        const orderRef = doc(db, "orders", orderId);
        const safeDeviceKey = deviceKey || buildOrderDeviceKey(orderId, 0);
        
        // First, get the current order to compute new order status
        const orderSnap = await withPerf(`firestore:getOrder:${orderId}`, () => getDoc(orderRef));
        const order = orderSnap.exists() ? { id: orderSnap.id, ...orderSnap.data() } : null;
        
        if (!order) {
          toast("Order not found", "error");
          return;
        }

        if (isCancelledStatusValue(order.status) || isCancelledStatusValue(getDeviceStatus(order, safeDeviceKey))) {
          toast("QC is disabled for canceled orders/devices", "error");
          return;
        }
        
        // Set device-level status to "received" after QC
        const deviceStatus = "received";
        
        // Temporarily update order in memory to compute new status
        const tempOrder = {
          ...order,
          qcDataByDevice: {
            ...order.qcDataByDevice,
            [safeDeviceKey]: qcData
          },
          deviceStatusByKey: {
            ...order.deviceStatusByKey,
            [safeDeviceKey]: deviceStatus
          }
        };
        
        // Compute new order status based on all devices
        const newOrderStatus = computeOrderStatus(tempOrder);
        
        try {
          await withPerf(`firestore:updateOrder:${orderId}`, () => updateDoc(orderRef, {
            [`qcDataByDevice.${safeDeviceKey}`]: qcData,
            [`deviceStatusByKey.${safeDeviceKey}`]: deviceStatus,
            ...(safeDeviceKey.endsWith("::0") ? { qcData } : {}),
            status: newOrderStatus,
            qcCompletedAt: new Date()
          }));
        } catch (e) {
          await withPerf(`firestore:setOrder:${orderId}`, () => setDoc(orderRef, {
            qcDataByDevice: { [safeDeviceKey]: qcData },
            deviceStatusByKey: { [safeDeviceKey]: deviceStatus },
            ...(safeDeviceKey.endsWith("::0") ? { qcData } : {}),
            status: newOrderStatus,
            qcCompletedAt: new Date()
          }, { merge: true }));
        }
        toast("QC saved", "success");
      } catch (e) {
        console.error(e);
        toast("Failed to save QC", "error");
      }
    }

    function computeStatusCounts() {
      const { visible, cancelled } = splitCancelled(state.allOrders);
      const statusCounts = new Map();
      
      // Count orders by order-level status AND by device-level statuses
      for (const o of visible) {
        const orderStatus = normalizeStatusKey(o?.status) || "unknown";
        
        // Count order-level status
        statusCounts.set(orderStatus, (statusCounts.get(orderStatus) || 0) + 1);
        
        // Also count any device-level statuses
        if (o?.deviceStatusByKey) {
          const deviceStatuses = new Set();
          for (const deviceStatus of Object.values(o.deviceStatusByKey)) {
            const normalized = normalizeStatusKey(deviceStatus);
            // Only count each unique device status once per order to avoid duplicates
            if (normalized && !deviceStatuses.has(normalized) && normalized !== orderStatus) {
              deviceStatuses.add(normalized);
              statusCounts.set(normalized, (statusCounts.get(normalized) || 0) + 1);
            }
          }
        }
      }
      
      const statusCountAll = visible.length;
      const cancelledCount = cancelled.length;
      // live orders = visible excluding completed + return-label-generated
      const liveOrders = visible.filter(o => {
        const s = normalizeStatusKey(o?.status);
        return s !== "completed" && s !== "return-label-generated";
      }).length;
      return { statusCounts, statusCountAll, cancelledCount, liveOrders, visible };
    }

    // ----------------------------

    function workflowStepperHTML(order) {
      const status = order.status || "order_pending";
      const hasLabel = !!getAnyTrackingNumber(order) || String(order.status || "").includes("label");
      const hasQc = !!(order.qcData || (order.qcDataByDevice && Object.keys(order.qcDataByDevice).length));
      let activeStep = 0;
      const s = String(status).toLowerCase();
      if (s.includes("completed") || s.includes("paid") || s.includes("re-offered-accepted")) activeStep = 4;
      else if (s.includes("re-offer")) activeStep = 3;
      else if (hasQc || s.includes("received") || s.includes("emailed")) activeStep = 2;
      else if (hasLabel || s.includes("label") || s.includes("transit") || s.includes("delivered_to_us")) activeStep = 1;
      else if (s.includes("pending") || s.includes("printing")) activeStep = 0;
      else if (s.includes("cancel")) activeStep = -1;
      if (activeStep === -1) {
        return `
          <div class="px-6 py-3 bg-rose-50 border-b border-rose-100 flex items-center justify-center gap-2 text-rose-700 font-medium text-sm">
            <i data-lucide="ban" style="width:16px;height:16px"></i> This order has been cancelled.
          </div>
        `;
      }
      const steps = [
        { label: "Pending", icon: "clock" },
        { label: "Label / Transit", icon: "truck" },
        { label: "Received / QC", icon: "shield-check" },
        { label: "Re-Offer", icon: "alert-triangle" },
        { label: "Paid & Done", icon: "check-circle" },
      ];
      const pct = Math.max(0, Math.min(100, (activeStep / (steps.length - 1)) * 100));
      return `
        <div class="px-6 py-4 bg-slate-50/50 border-b border-slate-200">
          <div class="relative flex items-center justify-between w-full max-w-lg mx-auto">
            <div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-0.5 bg-slate-200 -z-10"></div>
            <div class="absolute left-0 top-1/2 -translate-y-1/2 h-0.5 bg-indigo-600 -z-10 transition-all duration-500" style="width:${pct}%"></div>
            ${steps.map((st, idx) => {
              const isActive = idx <= activeStep;
              const isCurrent = idx === activeStep;
              return `
                <div class="relative z-10 flex flex-col items-center gap-2">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center border-2 transition-all duration-300 ${
                    isActive ? "bg-indigo-600 border-indigo-600 text-white" : "bg-white border-slate-300 text-slate-400"
                  }">
                    <i data-lucide="${st.icon}" style="width:14px;height:14px"></i>
                  </div>
                  <span class="text-[10px] uppercase font-bold tracking-wider absolute -bottom-6 whitespace-nowrap ${
                    isCurrent ? "text-indigo-700" : "text-slate-400"
                  }">${esc(st.label)}</span>
                </div>
              `;
            }).join("")}
          </div>
          <div class="h-4"></div>
        </div>
      `;
    }
    function renderStatusDropdown(order) {
      const open = state.statusDropdownOpen;
      if (!open) return "";
      const focused = getFocusedDevice(order);
      const isDeviceScoped = focused.isFocused && focused.deviceKey;
      const activeStatus = isDeviceScoped ? getDeviceStatus(order, focused.deviceKey) : normalizeStatusKey(order.status);
      return `

    function renderDrawer(order) {
      const noLabelCustomerSend = normalizeStatusKey(order?.shippingPreferenceNormalized) === "no_label_customer_send"

      const tabs = [
        { id: "overview", label: "Overview", icon: "layout-dashboard" },

        const acceptedPerDevice = Number.isFinite(acceptedTotal) ? (acceptedTotal / totalDeviceCount) : null;

              <div class="relative flex-shrink-0">

      async function handleSendAbandonedTestSequence() {
        const emailInput = document.getElementById("abandoned-sequence-email");
        const targetEmail = String(emailInput?.value || "").trim().toLowerCase();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(targetEmail)) {
          setAbandonedSequenceStatus("Please enter a valid email address.", "error");
          return;
        }

        const stages = [
          { key: "30m", subject: "Did you forget something?" },
          { key: "4h", subject: "Your quote is waiting" },
          { key: "24h", subject: "Limited-time bonus reminder" },
          { key: "72h", subject: "Final reminder before your quote expires" },
          { key: "7d", subject: "Last chance to complete checkout" },
        ];

        setAbandonedSequenceSending(true);
        setAbandonedSequenceStatus("Sending 5 emails. Please wait…", "info");

        try {
          for (let index = 0; index < stages.length; index += 1) {
            const stage = stages[index];
            const html = `
              <div style="font-family:Arial,sans-serif;line-height:1.6;color:#0f172a;max-width:640px;margin:0 auto;padding:24px;">
                <h2 style="margin:0 0 12px;font-size:24px;color:#0f172a;">SecondHandCell Test Email (${stage.key})</h2>
                <p style="margin:0 0 10px;">This is abandoned checkout sequence test email <strong>${index + 1}/5</strong>.</p>
                <p style="margin:0 0 10px;">Recipient: <strong>${targetEmail}</strong></p>
                <p style="margin:0;">Stage key: <strong>${stage.key}</strong></p>
              </div>
            `;

            await apiPost("/send-email", {
              to: targetEmail,
              subject: `[TEST ${index + 1}/5] ${stage.subject}`,
              html,
            }, { authRequired: true });
          }

          setAbandonedSequenceStatus(`Done! Sent all 5 test emails to ${targetEmail}.`, "success");
          toast(`Sent 5 abandoned-checkout test emails to ${targetEmail}.`, "success");
        } catch (error) {
          const message = error?.message || "Failed to send abandoned checkout sequence.";
          setAbandonedSequenceStatus(message, "error");
          toast(message, "error");
        } finally {
          setAbandonedSequenceSending(false);
        }
      }
