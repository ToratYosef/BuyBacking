    // ----------------------------

    const $bootLabel = document.getElementById("adminBootLabel");
    const $bootPercent = document.getElementById("adminBootPercent");
    function setAdminBootOverlay(show, progress = 0, label = "Loading admin workspace…") {
      if (!$bootOverlay || !$bootBar || !$bootLabel || !$bootPercent) return;
      const hasVisibleCachedData = !!(window.__adminCachedOrdersVisible || (typeof state !== "undefined" && state.ordersCacheHydrated && Array.isArray(state.allOrders) && state.allOrders.length));
      const shouldShow = !!show && !hasVisibleCachedData;

      $bootOverlay.classList.toggle("hidden", !shouldShow);
      $bootBar.style.width = `${safeProgress}%`;
      $bootLabel.textContent = label;
      $bootPercent.textContent = `${safeProgress}%`;
      if ($root) $root.style.visibility = shouldShow ? "hidden" : "visible";
    }
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[m]));
    }
    function stripHtmlForDisplay(html = "") {
      return String(html || "")
        .replace(/<style[\s\S]*?<\/style>/gi, " ")
        .replace(/<script[\s\S]*?<\/script>/gi, " ")
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<\/p>/gi, "\n\n")
        .replace(/<[^>]+>/g, " ")
        .replace(/\s+\n/g, "\n")
        .replace(/\n\s+/g, "\n")
        .replace(/[ \t]{2,}/g, " ")
        .trim();
    }
    function safeUpperTrim(s) { return String(s ?? "").trim().toUpperCase(); }
    function toDateAny(ts) {
      if (!ts) return null;
      const d = ts?.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
      return Number.isNaN(d.getTime()) ? null : d;
    }
    function formatDate(ts) {
      const d = toDateAny(ts);
      if (!d) return "N/A";
      return new Intl.DateTimeFormat("en-US", {
        month: "short",
        day: "2-digit",
        year: "numeric",
      }).format(d);
    }
    function formatTimeOnly(ts) {
      const d = toDateAny(ts);
      if (!d) return "N/A";
      return new Intl.DateTimeFormat("en-US", { hour: "numeric", minute: "2-digit" }).format(d);
    }
    function getLastCustomerEmailMillis(order = {}) {
      const candidates = [
        order.lastCustomerEmailSentAt,
        order.lastReminderSentAt,
        order.expiringReminderSentAt,
        order.kitReminderSentAt,
        order.reminderSentAt,
        order.reminderEmailSentAt,
        order.lastReminderAt,
        order.reviewRequestSentAt,
        order.returnLabelEmailSentAt,
        order.cancellationNotifiedAt,
      ];
      let latest = 0;
      for (const value of candidates) {
        const d = toDateAny(value);
        if (!d) continue;
        const time = d.getTime();
        if (time > latest) latest = time;
      }
      return latest > 0 ? latest : null;
    }
    function getOrderAge(ts) {
      const d = toDateAny(ts);
      if (!d) return "0 days";
      const diffMs = Math.max(0, Date.now() - d.getTime());
      const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
      return `${diffDays} day${diffDays !== 1 ? "s" : ""} old`;
    }
    function formatStatusLabel(status) {
      const normalized = String(status || "").trim().toLowerCase();
      if (normalized === "kits") return "Kits";
      if (normalized === "misc") return "Misc";
      if (normalized === "ready_to_pay" || normalized === "ready-to-pay") return "Ready To Pay";
      if (normalized === "issue_resolved") return "Pending Re-QC";
      return String(status).replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }
    // ----------------------------
    // SPEC: status buckets + visible filter bar
    // ----------------------------
    const STATUS_DROPDOWN_OPTIONS = [
      "order_pending",
      "label_generated",
      "kits",
      "phone_on_the_way",
      "delivered_to_us",
      "received",
      "emailed",
      "issue_resolved",
      "re-offered-pending",
      "re-offered-declined",
      "ready_to_pay",
      "return-label-generated",
      "completed",
      "misc",
      "cancelled"
    ];
    const EXPLICIT_STATUS_BUCKETS = new Set([
      "order_pending",
      "label_generated",
      "kits",
      "phone_on_the_way",
      "delivered_to_us",
      "received",
      "emailed",
      "issue_resolved",
      "re-offered-pending",
      "re-offered-declined",
      "ready_to_pay",
      "return-label-generated",
      "completed",
    ]);
    const KIT_PRINT_PENDING_STATUSES = new Set(["shipping_kit_requested", "kit_needs_printing", "needs_printing"]);
    const RECEIVED_VALUES = new Set(["received", "ready_to_pay", "imei_checked", "delivered_to_us", "phone_on_the_way"]);
    const PAST_RECEIVED_VALUES = new Set(["received", "ready_to_pay", "completed", "re-offered-accepted", "re-offered-declined", "re-offered-auto-accepted"]);
    const SENT_TO_US_VALUES = new Set([
      "phone_on_the_way",
      "delivered_to_us",
      "received",
      "emailed",
      "issue_resolved",
      "re-offered-pending",
      "re-offered-declined",
      "ready_to_pay",
      "return-label-generated",
      "completed",
    ]);
    function normalizeStatusKey(status) {
      const normalized = String(status || "").trim().toLowerCase();
      if (normalized === "re-offered-accepted" || normalized === "re_offered_accepted" || normalized === "re-offered-auto-accepted" || normalized === "re_offered_auto_accepted" || normalized === "requote_accepted") {
        return "ready_to_pay";
      }
      if (normalized === "auto_75_less" || normalized === "auto-75-less") {
        return "re-offered-pending";
      }
      if (normalized === "shipping_kit_requested" || normalized === "kit_needs_printing" || normalized === "kit_sent" || normalized === "kit_on_the_way_to_customer" || normalized === "kit_delivered" || normalized === "kit_on_the_way_to_us" || normalized === "kit_in_transit") {
        return "kits";
      }
      return normalized;
    }
    function isCancelledStatusValue(status) {
      const normalized = normalizeStatusKey(status);
      return normalized === "cancelled" || normalized === "canceled";
    }
    function isAutoCancelledAfter28Days(order) {
      const reason = String(order?.cancelReason || "").trim().toLowerCase();
      return Boolean(order?.autoCancelled) || reason === "label_voided_no_response_28_days";
    }
    function isMiscStatusValue(status) {
      const normalized = normalizeStatusKey(status);
      if (!normalized || normalized === "cancelled") return false;
      return !EXPLICIT_STATUS_BUCKETS.has(normalized);
    }
    function getOrderCurrentStatusValue(order) {
      // Deliberately read only current-status fields, never historical timelines.
      return normalizeStatusKey(order?.status ?? order?.currentStatus ?? order?.current_status);
    }
    function isReceivedStatusValue(status) {
      return RECEIVED_VALUES.has(normalizeStatusKey(status));
    }
    function isStatusPastReceived(status) {
      return PAST_RECEIVED_VALUES.has(normalizeStatusKey(status));
    }
    function isSentToUsStatusValue(status) {
      return SENT_TO_US_VALUES.has(normalizeStatusKey(status));
    }
    function isBalanceEmailStatus(order) {
      const s = normalizeStatusKey(order?.status);
      return s.includes("emailed_balance") || s.includes("emailed") && (order?.emailType === "balance");
    }
    function buildAdminActivityLogEntry(message, type = "status", metadata = {}) {
      return {
        type,
        message,
        metadata: metadata && typeof metadata === "object" ? metadata : {},
        at: new Date(),
      };
    }
    function getStatusSortTimestamp(order, deviceKey, status) {
      const normalized = normalizeStatusKey(status);
      const issueEntries = deviceKey ? getDeviceIssueEntries(order, deviceKey) : [];
      const issueUpdatedAt = issueEntries
        .map((issue) => toDateAny(issue?.updatedAt || issue?.createdAt || issue?.emailSentAt || null)?.getTime() || 0)
        .reduce((max, value) => Math.max(max, value), 0);
      const reofferUpdatedAt = toDateAny(order?.reOffer?.updatedAt || order?.reOffer?.createdAt || order?.reOfferUpdatedAt || null)?.getTime() || 0;
      const completedActivityAt = Array.isArray(order?.activityLog)
        ? order.activityLog
          .filter((entry) => {
            const typeValue = String(entry?.type || "").toLowerCase();
            const messageValue = String(entry?.message || "").toLowerCase();
            return typeValue.includes("status") && messageValue.includes("completed");
          })
          .map((entry) => toDateAny(entry?.at || entry?.createdAt || null)?.getTime() || 0)
          .reduce((max, value) => Math.max(max, value), 0)
        : 0;
      const statusUpdatedAt = toDateAny(
        order?.statusUpdatedAt ||
        order?.updatedAt ||
        order?.qcCompletedAt ||
        order?.completedAt ||
        order?.receivedAt ||
        order?.lastConditionEmailSentAt ||
        null
      )?.getTime() || 0;

      if (normalized === "issue_resolved") {
        return Math.max(issueUpdatedAt, statusUpdatedAt);
      }
      if (normalized === "emailed") {
        return Math.max(issueUpdatedAt, statusUpdatedAt);
      }
      if (normalized === "re-offered-pending" || normalized === "re-offered-declined" || normalized === "ready_to_pay") {
        return Math.max(reofferUpdatedAt, statusUpdatedAt);
      }
      if (normalized === "completed") {
        return Math.max(
          toDateAny(order?.completedAt || null)?.getTime() || 0,
          completedActivityAt,
          statusUpdatedAt
        );
      }
      return statusUpdatedAt;
    }
    function isLabelGenerationStage(order) {
      const s = normalizeStatusKey(order?.status);
      return s === "label_generated" || s === "needs_printing";
    }
    function getStatusClass(status) {
      const s = normalizeStatusKey(status);
      if (!s || s === "unknown") return "bg-slate-100 text-slate-800 border-slate-200";
      if (s.includes("cancel")) return "bg-slate-100 text-slate-600 border-slate-200";
      if (s.includes("pending") || s.includes("needs_printing")) return "bg-amber-100 text-amber-800 border-amber-200";
      if (s.includes("label") || s.includes("transit") || s.includes("delivered_to_us") || s.includes("phone_on_the_way")) return "bg-blue-100 text-blue-800 border-blue-200";

    function statusBadgeHTML(status, extra = "") {
      return `
        <div class="inline-flex flex-col gap-1">
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border ${getStatusClass(status)}">

        const normalizedTracking = String(trackingNumber || "").trim();
        const normalizedUrl = String(url || "").trim();

        seen.add(key);
        items.push({ kind, type, trackingNumber: normalizedTracking, url: normalizedUrl, carrier: String(carrier || "").trim(), source });

      addItem({
        type: "Primary Label",
        trackingNumber: order?.trackingNumber || order?.labelTrackingNumber || order?.uspsTrackingNumber || order?.uspsLabelTrackingNumber || order?.labelTrackingStatus?.trackingNumber || order?.labelTrackingStatus?.tracking_number,

        carrier: order?.returnTrackingCarrier || order?.return_label_carrier || "",

      if (state.selectedOrderId === normalizedOrder.id) {

      const candidates = [order.updatedAt, order.statusUpdatedAt, order.lastStatusUpdateAt, order.completedAt, order.receivedAt, order.createdAt];
      for (const candidate of candidates) {

    function mergeOrdersById(existing = [], incoming = []) {

      (Array.isArray(incoming) ? incoming : []).forEach((order) => {

        if (!previous || getOrderRevisionMillis(normalized) >= getOrderRevisionMillis(previous)) {

        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
      } catch {
        const a = document.createElement("a");
        a.href = url;
        a.target = "_blank";

    function getOrderPayoutTotal(order) {
      const explicit = Number(order?.totalPayout ?? order?.total_payout ?? order?.payoutTotal ?? order?.payout_total ?? NaN);
      if (Number.isFinite(explicit)) return explicit;
      const items = Array.isArray(order?.items) ? order.items : [];
      if (!items.length) {
        const single = Number(order?.price ?? order?.payout ?? 0);
        return Number.isFinite(single) ? single : 0;

      let sum = 0;
      for (const it of items) {
        const qty = normalizeQty(it?.qty ?? it?.quantity ?? 1);
        const unit = Number.parseFloat(it?.price ?? it?.payout ?? 0);
        sum += (Number.isFinite(unit) ? unit : 0) * qty;
      }
      return sum;
    }

      const fromIssueMap = order?.qcIssuesByDevice?.[deviceKey]?.password_locked?.unlockInfo;
      const source = fromDeviceMap || fromIssueMap;
      if (!source || typeof source !== 'object') return null;

      const method = String(source.method || '').trim().toLowerCase();
      if (!['pin', 'password', 'pattern'].includes(method)) return null;
      const value = String(source.value || '').trim();
      let patternPath = Array.isArray(source.patternPath)
        ? source.patternPath.map((value) => Number(value)).filter((value) => Number.isFinite(value) && value >= 1 && value <= 9)
        : [];

      if (!patternPath.length && method === 'pattern' && value) {
        patternPath = value
          .split(/[^0-9]+/)
          .map((value) => Number(value))
          .filter((value) => Number.isFinite(value) && value >= 1 && value <= 9);
      }

      return {
        reason: source.reason || 'password_locked',
        method,
        value,
        patternPath,
        updatedAt: source.updatedAt || null,
      };
    }

    function formatResponseTimeLeft(targetDate) {
      const due = toDateAny(targetDate);
      if (!due) return '';
      const diffMs = due.getTime() - Date.now();
      if (diffMs <= 0) return 'timer expired';
      const dayMs = 1000 * 60 * 60 * 24;
      const hourMs = 1000 * 60 * 60;
      const minuteMs = 1000 * 60;
      const days = Math.floor(diffMs / dayMs);
      const hours = Math.floor((diffMs % dayMs) / hourMs);
      const minutes = Math.floor((diffMs % hourMs) / minuteMs);
      if (days > 0) return `${days}d ${hours}h left`;
      if (hours > 0) return `${hours}h ${minutes}m left`;
      return `${Math.max(1, minutes)}m left`;

    async function getQcOfferFromDb(order, qcData = null) {
      const focused = getFocusedDevice(order);
      const item = focused?.entry?.item || order || {};
      const brand = String(qcData?.actualBrand || item.brand || order.brand || '').toLowerCase();
      const modelId = qcData?.actualModelId || item.modelId || item.model || order.modelId || order.model;
      const storage = String((qcData?.storageMatch === 'no' ? qcData?.actualStorage : qcData?.storage) || item.storage || order.storage || '');
      const carrier = normalizeCarrierForPricing(qcData?.carrier || item.carrier || item.lock || order.carrier || order.lock || 'unlocked');
      const conditionRaw = String(qcData?.condition || item.condition || order.condition || 'good').toLowerCase();
      const condition = (conditionRaw === 'damaged' ? 'broken' : conditionRaw);
      if (!brand || !modelId || !storage) return null;
      try {
        const snap = await withPerf(`firestore:getModel:${brand}:${modelId}`, () => getDoc(doc(db, 'devices', brand, 'models', modelId)));
        if (!snap.exists()) return null;
        const data = snap.data() || {};
        const prices = data.prices || {};
        const storageMap = prices[storage] || prices[String(storage).toUpperCase()] || prices[String(storage).toLowerCase()];
        if (!storageMap) return null;
        const carrierMap = storageMap[carrier] || storageMap.unlocked || storageMap.other;
        if (!carrierMap) return null;
        if (condition === 'no_power') {
          const brokenOffer = Number(carrierMap.broken ?? carrierMap.damaged ?? 0);
          const derivedNoPowerOffer = Number.isFinite(brokenOffer) ? Math.round((brokenOffer * 0.5) * 100) / 100 : 0;
          return Number.isFinite(derivedNoPowerOffer) ? derivedNoPowerOffer : null;
        }
        const directOffer = Number(carrierMap[condition]);
        if (Number.isFinite(directOffer) && directOffer > 0) return directOffer;
        return null;
      } catch {
        return null;
      }
    }

    function composeReofferReasoning(order, qcData = null, computedPrice = null) {
      const reasons = [];
      if (!qcData) return reasons;
      if (qcData.deviceMatch === 'no') reasons.push('Device received does not match the original model selection.');
      if (qcData.storageMatch === 'no') reasons.push('Storage/GB amount differs from what was quoted.');
      
      // Add broken issues if condition is broken
      if (['broken', 'no_power'].includes(qcData.condition) && qcData.brokenIssues && qcData.brokenIssues.length > 0) {
        const issueLabels = {
          'mic': 'Microphone not working',
          'camera': 'Camera not working',
          'crackedFront': 'Cracked front screen',
          'crackedBack': 'Cracked back glass',
          'lcdDeadSpots': 'LCD dead spots',
          'volumeButtons': 'Volume buttons not working',
          'powerButton': 'Power button not working',
          'touchNotWorking': 'Touch screen not working',
          'speaker': 'Speaker not working',
          'batteryIssue': 'Battery issue',
          'wifiIssue': 'WiFi/Bluetooth not working'
        };
        qcData.brokenIssues.forEach(issueId => {
          if (issueLabels[issueId]) {
            reasons.push(issueLabels[issueId]);
          }
        });
      }
      
      // Add other custom issue if specified
      if (['broken', 'no_power'].includes(qcData.condition) && qcData.otherIssue && qcData.otherIssue.trim()) {
        reasons.push(qcData.otherIssue.trim());
      }
      
      if (qcData.isLocked === 'yes') reasons.push('Screen lock / passcode is still active.');
      if (qcData.hasFmi === 'yes') reasons.push('FMI / iCloud / FRP / Google lock is still active.');

    function buildSeventyFiveLessReofferDraft(order, deviceKey = null, currentStatus = '') {

      const originalPrice = Number(getOriginalReofferCap(order, targetDeviceKey));
      if (!Number.isFinite(originalPrice) || originalPrice <= 0) return null;
      const reducedPrice = Number((originalPrice * 0.25).toFixed(2));
      if (!Number.isFinite(reducedPrice) || reducedPrice <= 0) return null;

      const normalizedStatus = normalizeStatusKey(currentStatus || getDeviceStatus(order, targetDeviceKey) || order?.status || '');
      let reasonText = 'Revised offer set at 75% less than the quoted amount after post-receipt review.';
      if (normalizedStatus === 'emailed') {

      } else if (normalizedStatus === 'issue_resolved') {
        reasonText = 'The reported issue was still unsolved, so this revised offer is set at 75% less than the quoted amount.';
      }

      return {
        deviceKey: targetDeviceKey,
        newPrice: reducedPrice,
        reasons: [reasonText],
        comments: normalizedStatus === 'issue_resolved'
          ? `75%-less re-offer sent from admin because the reported issue was still unsolved. Original quote: $${originalPrice.toFixed(2)}. Revised offer: $${reducedPrice.toFixed(2)}.`

      const unresolvedIssues = getUnresolvedDeviceIssues(order, deviceKey);

    // Compute order status from all device statuses
    // Pre-receive statuses (order_pending through label_generated) are order-level
    // Post-receive statuses (received onwards) are per-device
    function computeOrderStatus(order) {
      if (!order) return 'order_pending';
      
      // If order hasn't been received yet, use order-level status
      const currentOrderStatus = normalizeStatusKey(order.status);
      const preReceiveStatuses = ['order_pending', 'needs_printing', 'label_generated', 'kits', 'phone_on_the_way', 'delivered_to_us'];
      if (preReceiveStatuses.includes(currentOrderStatus)) {
        return currentOrderStatus;
      }
      
      // Get all devices from order (qty-expanded for consistent per-device status)
      const entries = getOrderDeviceEntries(order);
      if (entries.length === 0) return currentOrderStatus;
      
      // Get status for each device
      const deviceStatuses = entries.map((entry) => {
        const deviceKey = buildOrderDeviceKey(order.id, entry.deviceIndex);
        return getDeviceStatus(order, deviceKey);
      });

      // Single-device orders should mirror the only device status exactly.
      if (deviceStatuses.length === 1) {
        return deviceStatuses[0] || currentOrderStatus;
      }
      
      // Status priority for aggregation (higher index = more progressed)
      const statusPriority = {
        'received': 0,
        'ready_to_pay': 1,
        'imei_checked': 2,
        'emailed': 3,
        're-offered-pending': 4,
        're-offered-declined': 5,
        'completed': 6,
        'return-label-generated': 7
      };
      
      // Find the least progressed status (minimum priority)
      let minPriority = Infinity;
      let minStatus = 'received';
      
      for (const status of deviceStatuses) {
        const priority = statusPriority[status] ?? 0;
        if (priority < minPriority) {
          minPriority = priority;
          minStatus = status;
        }
      }
      
      // Special case: if all devices are completed, order is completed
      if (deviceStatuses.every(s => s === 'completed' || s === 're-offered-declined' || s === 'return-label-generated')) {
        return 'completed';
      }
      
      return minStatus;
    }
    
    async function updateDeviceStatusInline(orderId, deviceKey, newStatus) {

      const previousDeviceStatus = order?.deviceStatusByKey?.[deviceKey] ?? null;

      if (state.selectedOrderSnapshot?.id === orderId) {

            delete order.deviceStatusByKey[deviceKey];
          } else {

        if (state.selectedOrderSnapshot?.id === orderId) {
          state.selectedOrderSnapshot.deviceStatusByKey = { ...(state.selectedOrderSnapshot.deviceStatusByKey || {}) };

      const order = state.allOrders.find((entry) => entry.id === orderId) || state.selectedOrderSnapshot || null;
      if (!orderId || !order) return;
      const nextEmail = String(state.customerEmailDraft || "").trim().toLowerCase();

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        toast("Enter a valid email address.", "error");

      }
      if (nextEmail === currentEmail) {

        return;
      }

      state.customerEmailSaving = !resendEmails;
      state.customerEmailResending = resendEmails;
      render();

      const payload = {
        "shippingInfo.email": nextEmail,
        updatedAt: new Date(),
      };
      if (!order.email || String(order.email).trim().toLowerCase() === currentEmail) payload.email = nextEmail;
      if (!order.customerEmail || String(order.customerEmail).trim().toLowerCase() === currentEmail) payload.customerEmail = nextEmail;
      if (!order.userEmail || String(order.userEmail).trim().toLowerCase() === currentEmail) payload.userEmail = nextEmail;

      const previousValues = {
        shippingInfoEmail: order?.shippingInfo?.email,
        email: order?.email,
        customerEmail: order?.customerEmail,
        userEmail: order?.userEmail,
      };

      const applyLocalEmail = (target) => {
        if (!target) return;
        target.shippingInfo = { ...(target.shippingInfo || {}), email: nextEmail };
        if (Object.prototype.hasOwnProperty.call(payload, "email")) target.email = nextEmail;
        if (Object.prototype.hasOwnProperty.call(payload, "customerEmail")) target.customerEmail = nextEmail;
        if (Object.prototype.hasOwnProperty.call(payload, "userEmail")) target.userEmail = nextEmail;
      };
      const revertLocalEmail = (target) => {
        if (!target) return;
        target.shippingInfo = { ...(target.shippingInfo || {}) };
        if (previousValues.shippingInfoEmail === undefined) delete target.shippingInfo.email;
        else target.shippingInfo.email = previousValues.shippingInfoEmail;
        if (Object.prototype.hasOwnProperty.call(payload, "email")) {
          if (previousValues.email === undefined) delete target.email;
          else target.email = previousValues.email;
        }
        if (Object.prototype.hasOwnProperty.call(payload, "customerEmail")) {
          if (previousValues.customerEmail === undefined) delete target.customerEmail;
          else target.customerEmail = previousValues.customerEmail;
        }
        if (Object.prototype.hasOwnProperty.call(payload, "userEmail")) {
          if (previousValues.userEmail === undefined) delete target.userEmail;
          else target.userEmail = previousValues.userEmail;
        }
      };

      applyLocalEmail(order);
      if (state.selectedOrderSnapshot?.id === orderId && state.selectedOrderSnapshot !== order) {
        applyLocalEmail(state.selectedOrderSnapshot);
      }

      try {
        if (resendEmails) {

        } else {
          await withPerf(`firestore:updateCustomerEmail:${orderId}`, () => updateDoc(doc(db, "orders", orderId), payload));
        }
        state.customerEmailEditOpen = false;
        state.customerEmailDraft = "";
        state.customerEmailSaving = false;
        state.customerEmailResending = false;
        render();

        }
